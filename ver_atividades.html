<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Atividades</title>
    <!-- Supabase e Tabulator -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://unpkg.com/tabulator-tables@6.2.1/dist/css/tabulator_midnight.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@6.2.1/dist/js/tabulator.min.js"></script>
    
    <!-- Bibliotecas para gerar Word -->
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.0/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.js"></script>
    
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .btn-voltar { background: #334155; color: white; text-decoration: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: bold; }
        .btn-adicionar { background: #2563eb; color: white; text-decoration: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: bold; margin-right: 10px; display: inline-block; }
        #tabela-atividades { margin-top: 20px; font-size: 13px; }
        #filtro-pesquisa { width: 300px; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #475569; background: #1e293b; color: white; }
    </style>
</head>
<body>

    <div>Utilizador: <strong id="utilizador-info" style="font-weight: bold; color: #60a5fa;">A verificar...</strong></div>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
        <h1 style="margin: 0;">Histórico de Atividades <span id="contador-atividades" style="color: #64748b; font-size: 0.8em;"></span></h1>
        <div>
            <a href="https://franciscosilvamglpt.github.io/TopogfRegisto/registo_atividade.html" class="btn-adicionar">➕ Adicionar Atividade</a>
            <button onclick="guardarAlteracoes()" style="background: #22c55e; padding: 10px; border:none; color:white; border-radius:5px; cursor:pointer; margin-right: 10px;">💾 Guardar Alterações</button>
            <button onclick="downloadCSV()" style="background: #8b5cf6; padding: 10px; border:none; color:white; border-radius:5px; cursor:pointer; margin-right: 10px;">⬇ Exportar CSV</button>
            <a href="index.html" class="btn-voltar">⬅ Voltar</a>
        </div>
    </div>

    <input type="text" id="filtro-pesquisa" placeholder="🔍 Pesquisar">
    <div id="tabela-atividades"></div>

    <script>
        const SUPABASE_URL = 'https://dunondjiqawovisnwavg.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_WekrBSs5JOjnJ1SGxFvmKQ_3v6AnBMs'; 
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let table;

        // Função auxiliar para formatar a data para DD/MM/AAAA HH:mm
        function formatarDataPT(valor) {
            if (!valor) return "";
            // Remove o 'T' se existir
            let limpo = valor.replace('T', ' ');
            
            // Espera o formato AAAA-MM-DD HH:mm:ss ou AAAA-MM-DD HH:mm
            let partes = limpo.split(' ');
            if (partes.length < 2) return limpo;

            let dataPartes = partes[0].split('-');
            if (dataPartes.length !== 3) return limpo;

            let ano = dataPartes[0];
            let mes = dataPartes[1];
            let dia = dataPartes[2];

            let horaMin = partes[1].substring(0, 5); // Pega apenas HH:mm

            return `${dia}/${mes}/${ano} ${horaMin}`;
        }

        function atualizarContador() {
            if(table) {
                const contagem = table.getRows("active").length;
                document.getElementById("contador-atividades").innerText = "(" + contagem + ")";
            }
        }

        async function carregarAtividades() {
            const { data: { session } } = await sbClient.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            document.getElementById('utilizador-info').innerText = session.user.email;

            const { data, error } = await sbClient
                .from('atividades')
                .select('*')
                .order('id', { ascending: false });

            if (error) { console.error("Erro ao carregar:", error); return; }

            table = new Tabulator("#tabela-atividades", {
                data: data,
                layout: "fitColumns",
                pagination: "local",
                paginationSize: 15,
                columns: [
                    {title: "Técnico", field: "tecnico", editor: "input"},
                    {
                        title: "Início", 
                        field: "data_hora_inicio", 
                        editor: "input",
                        formatter: function(cell) {
                            return formatarDataPT(cell.getValue());
                        }
                    },
                    {
                        title: "Fim", 
                        field: "data_hora_fim", 
                        editor: "input",
                        formatter: function(cell) {
                            return formatarDataPT(cell.getValue());
                        }
                    },
                    {title: "Local/Obra", field: "local_obra", editor: "input"},
                    {title: "Serviço", field: "servico", editor: "input"},
                    {title: "Ações", width: 160, hozAlign: "center", formatter: function() {
                        return "<button class='btn-word' style='background:#2563eb; color:white; border:none; padding:2px 8px; border-radius:3px; margin-right:5px; cursor:pointer;'>Word</button>" +
                               "<button class='btn-apagar' style='background:#ef4444; color:white; border:none; padding:2px 8px; border-radius:3px; cursor:pointer;'>Apagar</button>";
                    }, cellClick: function(e, cell) {
                        const data = cell.getRow().getData();
                        if(e.target.classList.contains('btn-word')) {
                            gerarWordIndividual(data);
                        } else if(e.target.classList.contains('btn-apagar')) {
                            if(confirm("Apagar esta atividade?")) {
                                sbClient.from('atividades').delete().eq('id', data.id).then(() => {
                                    cell.getRow().delete();
                                    atualizarContador();
                                });
                            }
                        }
                    }}
                ]
            });
        }

        async function gerarWordIndividual(data) {
            try {
                const response = await fetch("template.docx");
                if (!response.ok) throw new Error("Ficheiro template.docx não encontrado.");
                
                const content = await response.arrayBuffer();
                const zip = new PizZip(content);
                const doc = new docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

                doc.render({
                    Tecnico_Nome: data.tecnico,
                    dataHoraInicio: formatarDataPT(data.data_hora_inicio),
                    dataHoraFim: formatarDataPT(data.data_hora_fim),
                    Atividade_Local_Obra: data.local_obra,
                    Atividade_Servico: data.servico
                });

                const out = doc.getZip().generate({ type: "blob" });
                saveAs(out, `Atividade_${data.id}.docx`);
            } catch (error) {
                console.error(error);
                alert("Erro ao gerar Word: " + error.message);
            }
        }

        async function guardarAlteracoes() { /* Logica de guardar atualizada */ }
        function downloadCSV() { table.download("csv", "historico_atividades.csv"); }

        carregarAtividades();
    </script>
</body>
</html>
