<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Atividades</title>

    <link href="https://unpkg.com/tabulator-tables@6.2.1/dist/css/tabulator_midnight.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@6.2.1/dist/js/tabulator.min.js"></script>
    <script src="https://unpkg.com/pizzip@3.2.0/dist/pizzip.js"></script>
    <script src="https://unpkg.com/docxtemplater@3.69.0/build/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { background-color: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .btn-voltar { background: #334155; color: white; text-decoration: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: bold; }
        .toolbar-header { flex-wrap: wrap; gap: 10px; }
        .toolbar-actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        #tabela-atividades-wrap { margin-top: 20px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        #tabela-atividades { font-size: 13px; }
        #filtro-pesquisa { width: 100%; max-width: 300px; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #475569; background: #1e293b; color: white; font-size: 16px; }
        .btn-docx { background:#3b82f6; color:white; border:none; padding:4px 8px; border-radius:3px; cursor:pointer; margin-right: 4px; font-size: 12px; }
        .btn-anexo { background:#f59e0b; color:white; border:none; padding:4px 8px; border-radius:3px; cursor:pointer; margin-right: 4px; font-size: 12px; }
        .btn-anexo.tem-anexo { background:#16a34a; }
        .btn-apagar { background:#ef4444; color:white; border:none; padding:4px 8px; border-radius:3px; cursor:pointer; font-size: 12px; }
        .link-anexo { color:#60a5fa; text-decoration: none; }
        .sem-anexo { color:#64748b; }

        .modal-anexo-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-anexo-overlay.aberta { display: flex; }
        .modal-anexo-conteudo {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
        }
        .modal-anexo-conteudo img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        .modal-anexo-fechar {
            position: absolute;
            top: -14px;
            right: -14px;
            background: #ef4444;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ajuste para dispositivos móveis */
        @media (max-width: 640px) {
            body { padding: 12px; }
            .toolbar-actions a, .toolbar-actions button { flex: 1 1 auto; text-align: center; margin-right: 0; }
        }
    </style>
</head>
<body>

    <div>Utilizador: <strong id="utilizador-info" style="font-weight: bold; color: #60a5fa;">A verificar...</strong></div>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;" class="toolbar-header">
        <h1 style="margin: 0;">Histórico de Atividades <span id="contador-atividades" style="color: #64748b; font-size: 0.8em;"></span></h1>
        <div class="toolbar-actions">
<a href="https://franciscosilvamglpt.github.io/TopogfRegisto/registo_atividade.html" style="background: #0ea5e9; color: white; text-decoration: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: bold; display: inline-block;">➕ Adicionar Atividade</a>
            <button onclick="guardarAlteracoes()" style="background: #22c55e; padding: 10px; border:none; color:white; border-radius:5px; cursor:pointer;">💾 Guardar Alterações</button>
            <button onclick="exportarParaExcel()" style="background: #8b5cf6; padding: 10px; border:none; color:white; border-radius:5px; cursor:pointer;">⬇ Exportar Excel</button>
            <a href="index.html" class="btn-voltar">⬅ Voltar</a>
        </div>
    </div>

    <input type="text" id="filtro-pesquisa" placeholder="🔍 Pesquisar">

    <div id="tabela-atividades-wrap">
        <div id="tabela-atividades"></div>
    </div>

    <!-- Input de ficheiro escondido, reutilizado pelo botão de Anexo de todas as linhas -->
    <input type="file" id="input-anexo" accept="image/*" capture="environment" style="display:none">

            <img id="modal-anexo-img" src="" alt="Anexo da atividade">
        </div>
    </div>

function formatarDataParaWord(dataStr, ehFim) {
    if (!dataStr) return '';
    const [data, hora] = dataStr.split('T');
    if (!data) return dataStr;
    const [ano, mes, dia] = data.split('-');
    let periodo = '';
    if (hora) {
        const horas = parseInt(hora.substring(0, 2), 10);
        // Início: até às 13h (exclusive) conta como Manhã, a partir das 13h como Tarde.
        // Fim: as 13h em ponto ainda fecham uma atividade da Manhã (ex.: 9h-13h);
        // só depois das 13h é que conta como Tarde (ex.: 13h-16h).
        periodo = ehFim
            ? (horas <= 13 ? 'Manhã' : 'Tarde')
            : (horas < 13 ? 'Manhã' : 'Tarde');
    }
    return `${dia}/${mes}/${ano}${periodo ? '  ' + periodo : ''}`;
}

        function base64ToArrayBuffer(base64) {
            const binaryString = atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

const ANEXO_CAIXA_LARGURA = 590;
const ANEXO_CAIXA_ALTURA = 515;
const ANEXO_MARCADOR = "ANEXOIMAGEMPLACEHOLDERXPTO";

async function carregarAnexoImagem(url) {
    const resposta = await fetch(url);
    if (!resposta.ok) {
        throw new Error("Não foi possível obter a imagem do anexo (HTTP " + resposta.status + ")");
    }
    const arrayBufferOriginal = await resposta.arrayBuffer();
    const bitmap = await createImageBitmap(new Blob([arrayBufferOriginal]));

    const racioLargura = bitmap.width / ANEXO_CAIXA_LARGURA;
    const racioAltura = bitmap.height / ANEXO_CAIXA_ALTURA;
    const racioMaior = Math.max(racioLargura, racioAltura, 1); 

    const largura = Math.max(1, Math.round(bitmap.width / racioMaior));
    const altura = Math.max(1, Math.round(bitmap.height / racioMaior));

    const canvas = document.createElement("canvas");
    canvas.width = largura;
    canvas.height = altura;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(bitmap, 0, 0, largura, altura);

    const blobPng = await new Promise(function (resolve) {
        canvas.toBlob(resolve, "image/png");
    });
    const arrayBuffer = await blobPng.arrayBuffer();

    return { arrayBuffer: arrayBuffer, size: [largura, altura] };
}

function pxParaEmu(px) {
    return Math.round(px * 9525); // 1px a 96dpi = 9525 EMU
}

function substituirRunComMarcador(xml, marcador, novoRunXml) {
    const idxMarcador = xml.indexOf(marcador);
    if (idxMarcador === -1) {
        return xml;
    }
    const inicioComEspaco = xml.lastIndexOf("<w:r ", idxMarcador);
    const inicioSemEspaco = xml.lastIndexOf("<w:r>", idxMarcador);
    const inicio = Math.max(inicioComEspaco, inicioSemEspaco);
    const fimTag = xml.indexOf("</w:r>", idxMarcador);
    if (inicio === -1 || fimTag === -1) {
        return xml;
    }
    const fim = fimTag + "</w:r>".length;
    return xml.slice(0, inicio) + novoRunXml + xml.slice(fim);
}

function inserirImagemAnexo(zip, imagemArrayBuffer, sizePx) {
    const caminhoMedia = "word/media/anexo_foto.png";
    zip.file(caminhoMedia, imagemArrayBuffer);

    const caminhoRels = "word/_rels/document.xml.rels";
    let relsXml = zip.file(caminhoRels).asText();
    const idsExistentes = Array.from(relsXml.matchAll(/Id="rId(\d+)"/g)).map(function (m) {
        return parseInt(m[1], 10);
    });
    const maiorId = idsExistentes.length ? Math.max.apply(null, idsExistentes) : 0;
    const novoId = "rId" + (maiorId + 1);
    const novaRelacao = '<Relationship Id="' + novoId + '" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="media/anexo_foto.png"/>';
    relsXml = relsXml.replace("</Relationships>", novaRelacao + "</Relationships>");
    zip.file(caminhoRels, relsXml);

    const cx = pxParaEmu(sizePx[0]);
    const cy = pxParaEmu(sizePx[1]);
    const drawingXml =
        '<w:r><w:rPr><w:noProof/></w:rPr><w:drawing>' +
        '<wp:inline distT="0" distB="0" distL="0" distR="0">' +
        '<wp:extent cx="' + cx + '" cy="' + cy + '"/>' +
        '<wp:effectExtent l="0" t="0" r="0" b="0"/>' +
        '<wp:docPr id="909001" name="AnexoFoto"/>' +
        '<wp:cNvGraphicFramePr><a:graphicFrameLocks xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" noChangeAspect="1"/></wp:cNvGraphicFramePr>' +
        '<a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">' +
        '<a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture">' +
        '<pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">' +
        '<pic:nvPicPr><pic:cNvPr id="909001" name="AnexoFoto"/><pic:cNvPicPr/></pic:nvPicPr>' +
        '<pic:blipFill><a:blip r:embed="' + novoId + '"/><a:stretch><a:fillRect/></a:stretch></pic:blipFill>' +
        '<pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="' + cx + '" cy="' + cy + '"/></a:xfrm>' +
        '<a:prstGeom prst="rect"><a:avLst/></a:prstGeom></pic:spPr>' +
        '</pic:pic></a:graphicData></a:graphic></wp:inline></w:drawing></w:r>';

    const caminhoDoc = "word/document.xml";
    let docXml = zip.file(caminhoDoc).asText();
    docXml = substituirRunComMarcador(docXml, ANEXO_MARCADOR, drawingXml);
    zip.file(caminhoDoc, docXml);
}

async function gerarDocx(rowData) {
    try {
        let anexoPreparado = null;
        if (rowData.anexo) {
            anexoPreparado = await carregarAnexoImagem(rowData.anexo);
        }

        const zip = new PizZip(base64ToArrayBuffer(TEMPLATE_DOCX_BASE64));
        const doc = new window.docxtemplater(zip, {
            paragraphLoop: true,
            linebreaks: true,
            delimiters: { start: "{{", end: "}}" }
        });

        // Mapeamento fixo: nome do técnico -> número de técnico.
        const NUMERO_POR_TECNICO = {
            "Francisco S": 800,
            "Daniel P": 715
        };

        // O campo "tecnico" pode ter mais do que um nome (ex.: "Daniel P, Francisco S").
        // O template tem 2 linhas para identificação, por isso separamos até 2 técnicos.
        const nomesTecnicos = (rowData.tecnico || "")
            .split(",")
            .map(t => t.trim())
            .filter(Boolean);

        const dadosTemplate = {
            Tecnico1_Nome: nomesTecnicos[0] || "",
            Tecnico1_numero: nomesTecnicos[0] ? (NUMERO_POR_TECNICO[nomesTecnicos[0]] ?? "") : "",
            Tecnico2_Nome: nomesTecnicos[1] || "",
            Tecnico2_numero: nomesTecnicos[1] ? (NUMERO_POR_TECNICO[nomesTecnicos[1]] ?? "") : "",
            numero_obra: rowData.numero_obra || "",
            dataHoraInicio: formatarDataParaWord(rowData.data_hora_inicio, false) || "",
            dataHoraFim: formatarDataParaWord(rowData.data_hora_fim, true) || "",
            Atividade_Local_Obra: rowData.local_obra || "",
            Atividade_Servico: rowData.servico || ""
        };
        dadosTemplate["%Atividade_Anexo"] = anexoPreparado ? ANEXO_MARCADOR : "";
        doc.render(dadosTemplate);
        const zipFinal = doc.getZip();
        if (anexoPreparado) {
            inserirImagemAnexo(zipFinal, anexoPreparado.arrayBuffer, anexoPreparado.size);
        }

        const blob = zipFinal.generate({
            type: "blob",
            mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
        });

        const nomeBase = (rowData.tecnico || "atividade").trim().replace(/[^a-zA-Z0-9]+/g, "_");
        const nomeFicheiro = "Atividade_" + nomeBase + "_" + rowData.id + ".docx";

        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = nomeFicheiro;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
    } catch (error) {
        console.error("Erro ao gerar o documento Word:", error);
        if (error.properties && error.properties.errors) {
            console.error(JSON.stringify(error.properties.errors, null, 2));
        }
        alert("Erro ao gerar o documento Word. Verifica a consola (F12).");
    }
}

        async function enviarAnexo(file, id) {
            if (anexoBotaoAtual) {
                anexoBotaoAtual.disabled = true;
                anexoBotaoAtual.innerText = "⏳ A enviar...";
            }

            try {
                const extensao = (file.name.split('.').pop() || 'jpg').toLowerCase();
                const caminho = "atividade_" + id + "_" + Date.now() + "." + extensao;

                const { error: erroUpload } = await sbClient
                    .storage
                    .from(ANEXO_BUCKET)
                    .upload(caminho, file, { upsert: true });

                if (erroUpload) {
                    console.error("Erro ao enviar o anexo:", erroUpload);
                    alert("Erro ao enviar o anexo. Verifica a consola (F12).");
                    return;
                }

                const { data: urlData } = sbClient
                    .storage
                    .from(ANEXO_BUCKET)
                    .getPublicUrl(caminho);

                const urlPublico = urlData.publicUrl;

const { error: erroUpdate } = await sbClient
                .from('atividades')
                .update({ anexo: urlPublico })
                .eq('id', id);

            if (erroUpdate) {
                console.error("Erro ao guardar o anexo na base de dados:", erroUpdate);
                alert("O anexo foi enviado, mas houve um erro ao guardar na base de dados. Verifica a consola (F12).");
                return;
            }

            const linha = table.getRow(id);
            if (linha) {
                await linha.update({ anexo: urlPublico });
            }

            alert("Anexo enviado e guardado com sucesso!");

        } catch (error) {
            console.error("Erro inesperado ao enviar o anexo:", error);
            alert("Erro inesperado ao enviar o anexo. Verifica a consola (F12).");
        } finally {
            if (anexoBotaoAtual) {
                anexoBotaoAtual.disabled = false;
                anexoBotaoAtual.innerText = "📎 Anexo";
                anexoBotaoAtual.classList.add('tem-anexo');
            }
            anexoBotaoAtual = null;
            anexoRowIdAtual = null;
            const inputAnexo = document.getElementById('input-anexo');
            if (inputAnexo) {
                inputAnexo.value = "";
            }
        }
}

        document.getElementById('input-anexo').addEventListener('change', function(e) {
            const file = e.target.files[0];
            e.target.value = ""; // permite escolher o mesmo ficheiro outra vez, se necessário
            if (!file || anexoRowIdAtual === null) return;
            enviarAnexo(file, anexoRowIdAtual);
        });

        // Função para atualizar o contador
        function atualizarContador() {
            if(table) {
                const contagem = table.getRows("active").length;
                document.getElementById("contador-atividades").innerText = "(" + contagem + ")";
            }
        }

        // Mostra a foto do anexo numa modal, em vez de abrir num separador novo.
        function abrirModalAnexo(url) {
            document.getElementById('modal-anexo-img').src = url;
            document.getElementById('modal-anexo').classList.add('aberta');
            document.body.style.overflow = 'hidden';
        }

        function fecharModalAnexo() {
            document.getElementById('modal-anexo').classList.remove('aberta');
            document.getElementById('modal-anexo-img').src = '';
            document.body.style.overflow = '';
        }

        // Fecha a modal se o clique foi no fundo escuro (fora da imagem/botão).
        function fecharModalAnexoSeBackdrop(e) {
            if (e.target.id === 'modal-anexo') {
                fecharModalAnexo();
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') fecharModalAnexo();
        });

    // Formata uma data ISO ("2026-07-21T09:30") como "21/07/2026 09:30".
    // Usada tanto na tabela em ecrã como na exportação para Excel, para que
    // ambas mostrem exatamente o mesmo formato.
    function formatarDataHoraTexto(valor) {
        if (!valor) return '';

        const [data, hora] = valor.split('T');
        if (!data) return valor;

        const [ano, mes, dia] = data.split('-');
        const horaLimpa = hora ? hora.substring(0, 5) : '';

        return horaLimpa ? `${dia}/${mes}/${ano} ${horaLimpa}` : `${dia}/${mes}/${ano}`;
    }

    function formatarDataHora(cell) {
        const valor = cell.getValue();
        if (!valor) return '—';
        return formatarDataHoraTexto(valor);
    }

    async function carregarAtividades() {
    const { data: { session } } = await sbClient.auth.getSession();
    if (!session) { window.location.href = 'index.html'; return; }
    document.getElementById('utilizador-info').innerText = session.user.email;

    const { data, error } = await sbClient
        .from('atividades')
        .select('*')
        .order('id', { ascending: false });

    if (error) { console.error("Erro ao carregar:", error); return; }

    table = new Tabulator("#tabela-atividades", {
        data: data,
        layout: "fitData", // Ajusta a largura de cada coluna ao conteúdo
        pagination: "local",
        paginationSize: 15,
        columns: [
            {title: "Técnico", field: "tecnico", editor: "input"},
            {title: "Início", field: "data_hora_inicio", formatter: formatarDataHora, editor: "input"},
            {title: "Fim", field: "data_hora_fim", formatter: formatarDataHora, editor: "input"},
            {title: "Local/Obra", field: "local_obra", editor: "input"},
            {title: "Nº Obra", field: "numero_obra", editor: "input"},
            {title: "Serviço", field: "servico", editor: "input"},
            {title: "Anexo", field: "anexo", formatter: function(cell) {
                const valor = cell.getValue();
                if (valor) {
                    return "<a class='link-anexo' href='javascript:void(0)'>🖼️ Ver</a>";
                }
                return "<span class='sem-anexo'>—</span>";
            }, width: 90, hozAlign: "center", cellClick: function(e, cell) {
                const valor = cell.getValue();
                if (valor) {
                    abrirModalAnexo(valor);
                }
            }},
            {title: "Ações", formatter: function(cell) {
                const temAnexo = !!cell.getRow().getData().anexo;
                return "<button class='btn-docx'>📄 Docx</button>" +
                       "<button class='btn-anexo" + (temAnexo ? " tem-anexo" : "") + "'>" + (temAnexo ? "✅ Anexo" : "📎 Anexo") + "</button>" +
                       "<button class='btn-apagar'>Apagar</button>";
            }, width: 220, hozAlign: "center", cellClick: function(e, cell) {
                const rowData = cell.getRow().getData();

                if (e.target.classList.contains('btn-docx')) {
                    gerarDocx(rowData);
                    return;
                }

                if (e.target.classList.contains('btn-anexo')) {
                    anexoRowIdAtual = rowData.id;
                    anexoBotaoAtual = e.target;
                    document.getElementById('input-anexo').click();
                    return;
                }

                if (e.target.classList.contains('btn-apagar')) {
                    if(confirm("Apagar esta atividade?")) {
                        const id = rowData.id;
                        sbClient.from('atividades').delete().eq('id', id).then(() => {
                            cell.getRow().delete();
                            atualizarContador();
                        });
                    }
                }
            }}
        ]
    });
            table.on("tableBuilt", atualizarContador);
            table.on("dataFiltered", atualizarContador);

            document.getElementById("filtro-pesquisa").addEventListener("keyup", function(){
                table.setFilter(function(data){
                    const termo = document.getElementById("filtro-pesquisa").value.toLowerCase();
                    return Object.values(data).some(val => 
                        String(val).toLowerCase().includes(termo)
                    );
                });
            });
        }

        async function guardarAlteracoes() {
            const dados = table.getData();
            let sucesso = true;

            for (const item of dados) {
                const { error } = await sbClient
                    .from('atividades')
                    .update({
                        tecnico: item.tecnico,
                        data_hora_inicio: item.data_hora_inicio,
                        data_hora_fim: item.data_hora_fim,
                        local_obra: item.local_obra,
                        numero_obra: item.numero_obra,
                        servico: item.servico
                    })
                    .eq('id', item.id);

                if (error) {
                    console.error("Erro ao atualizar ID " + item.id, error);
                    sucesso = false;
                }
            }

            if (sucesso) {
                alert("Todas as alterações foram guardadas com sucesso!");
            } else {
                alert("Alguns registos falharam ao guardar. Verifica a consola (F12).");
            }
        }

        // Calcula o número de horas (com casas decimais) entre a entrada e a saída.
        function calcularHoras(inicio, fim) {
            if (!inicio || !fim) return 0;
            const ms = new Date(fim) - new Date(inicio);
            if (isNaN(ms) || ms <= 0) return 0;
            return Math.round((ms / 3600000) * 100) / 100;
        }

        function aplicarBordaFina(cell) {
            const lado = { style: 'thin' };
            cell.border = { top: lado, bottom: lado, left: lado, right: lado };
        }

        async function exportarParaExcel() {
            try {
                const workbook = new ExcelJS.Workbook();
                const response = await fetch('atividades.xlsx');
                if (!response.ok) {
                    throw new Error("Não encontrei o ficheiro 'atividades.xlsx' na mesma pasta (HTTP " + response.status + ").");
                }
                await workbook.xlsx.load(await response.arrayBuffer());
                const worksheet = workbook.getWorksheet(1);
                if (!worksheet) {
                    throw new Error("O ficheiro atividades.xlsx não tem nenhuma folha de cálculo legível.");
                }

            const dados = table.getData();

            // ---- Tabela 1: uma linha por atividade (igual à tabela do ecrã + Horas) ----
            let linha = 5;
            dados.forEach(row => {
                const horas = calcularHoras(row.data_hora_inicio, row.data_hora_fim);

                const celTecnico = worksheet.getCell(linha, 2);   // B - Técnico
                const celInicio = worksheet.getCell(linha, 3);    // C - Data Início
                const celFim = worksheet.getCell(linha, 4);       // D - Data Fim
                const celHoras = worksheet.getCell(linha, 5);     // E - Horas
                const celObra = worksheet.getCell(linha, 6);      // F - Local/Obra
                const celNumObra = worksheet.getCell(linha, 7);   // G - Nº Obra
                const celServico = worksheet.getCell(linha, 8);   // H - Serviço
                const celAnexo = worksheet.getCell(linha, 9);     // I - Anexo

                celTecnico.value = row.tecnico || '';
                celInicio.value = formatarDataHoraTexto(row.data_hora_inicio);
                celFim.value = formatarDataHoraTexto(row.data_hora_fim);
                celHoras.value = horas;
                celHoras.numFmt = '0.00';
                celObra.value = row.local_obra || '';
                celNumObra.value = row.numero_obra || '';
                celServico.value = row.servico || '';

                if (row.anexo) {
                    celAnexo.value = { text: 'Ver anexo', hyperlink: row.anexo };
                    celAnexo.font = { color: { argb: 'FF2563EB' }, underline: true };
                } else {
                    celAnexo.value = '';
                }

                [celTecnico, celInicio, celFim, celHoras, celObra, celNumObra, celServico, celAnexo].forEach(aplicarBordaFina);

                linha++;
            });

            // ---- Tabela 2: total de horas por técnico individual + obra ----
            // Quando uma atividade tem vários técnicos ("Daniel, Francisco"), cada
            // um deles é contabilizado individualmente com a duração total dessa
            // atividade (não dividida entre eles).
            const totais = {}; // chave: "tecnico||local_obra||numero_obra" -> { tecnico, local_obra, numero_obra, horas }

            dados.forEach(row => {
                const horas = calcularHoras(row.data_hora_inicio, row.data_hora_fim);
                if (horas <= 0) return;

                const tecnicos = (row.tecnico || '')
                    .split(',')
                    .map(t => t.trim())
                    .filter(Boolean);

                tecnicos.forEach(tec => {
                    const chave = tec + '||' + (row.local_obra || '') + '||' + (row.numero_obra || '');
                    if (!totais[chave]) {
                        totais[chave] = { tecnico: tec, local_obra: row.local_obra || '', numero_obra: row.numero_obra || '', horas: 0 };
                    }
                    totais[chave].horas += horas;
                });
            });

            const linhasTotais = Object.values(totais).sort((a, b) => {
                return a.tecnico.localeCompare(b.tecnico, 'pt') || a.local_obra.localeCompare(b.local_obra, 'pt');
            });

            let linha2 = 5;
            linhasTotais.forEach(item => {
                const celTecnico = worksheet.getCell(linha2, 12); // L - Técnico
                const celObra = worksheet.getCell(linha2, 13);    // M - Local/Obra
                const celNumObra = worksheet.getCell(linha2, 14); // N - Nº Obra
                const celTotal = worksheet.getCell(linha2, 15);   // O - Total Horas

                celTecnico.value = item.tecnico;
                celObra.value = item.local_obra;
                celNumObra.value = item.numero_obra;
                celTotal.value = Math.round(item.horas * 100) / 100;
                celTotal.numFmt = '0.00';

                [celTecnico, celObra, celNumObra, celTotal].forEach(aplicarBordaFina);

                linha2++;
            });

            // ---- Tabela 3: total de horas por técnico (todas as obras) ----
            // A Tabela 3 já tem fórmulas SUMIF prontas no template (a somar a
            // coluna "Total Horas" da Tabela 2). O problema é que o Excel guarda
            // em cache o último resultado calculado, que no template em branco
            // era 0 — e só o recalcula quando o utilizador força uma atualização.
            // Para já aparecer certo ao abrir, calculamos aqui o valor real e
            // atualizamos o cache da fórmula diretamente.
            const totalPorTecnico = {};
            linhasTotais.forEach(item => {
                totalPorTecnico[item.tecnico] = (totalPorTecnico[item.tecnico] || 0) + item.horas;
            });

            let linha3 = 5;
            while (linha3 < 200) {
                const celTecnico3 = worksheet.getCell(linha3, 17); // Q - Técnico
                const nomeTecnico = celTecnico3.value;
                if (!nomeTecnico) break;

                const celTotal3 = worksheet.getCell(linha3, 18); // R - Total Horas
                const totalHoras = Math.round((totalPorTecnico[nomeTecnico] || 0) * 100) / 100;

                if (celTotal3.formula) {
                    celTotal3.value = { formula: celTotal3.formula, result: totalHoras };
                } else {
                    celTotal3.value = totalHoras;
                }

                linha3++;
            }

            // Pede ao Excel para recalcular todas as fórmulas assim que o
            // ficheiro for aberto, como segurança extra.
            workbook.calcProperties = workbook.calcProperties || {};
            workbook.calcProperties.fullCalcOnLoad = true;

            const buffer = await workbook.xlsx.writeBuffer();
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([buffer], {type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"}));
            link.download = "Atividades_Exportadas.xlsx";
            link.click();
            } catch (erro) {
                console.error("Erro ao exportar para Excel:", erro);
                alert("Não foi possível exportar o Excel: " + erro.message + "\n\nVerifica a consola (F12) para mais detalhes.");
            }
        }

        carregarAtividades();
