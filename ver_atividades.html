<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Atividades</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; color: #fff; font-size: 13px; }
        th, td { border: 1px solid #444; padding: 8px; text-align: left; }
        th { background-color: #1e293b; }
        input { width: 90%; background: #334155; color: white; border: 1px solid #475569; padding: 4px; }
        button { cursor: pointer; padding: 5px 10px; background: #3b82f6; border: none; color: white; border-radius: 4px; }
        .btn-salvar { background: #22c55e; }
        .btn-apagar { background: #ef4444; margin-left: 5px; }
        .btn-voltar { background: #334155; color: white; text-decoration: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div>Utilizador: <strong id="utilizador-info" style="font-weight: bold; color: #60a5fa;">A verificar...</strong></div>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
        <h1 style="margin: 0;">Histórico de Atividades</h1>
        <a href="index.html" class="btn-voltar">⬅ Voltar</a>
    </div>

    <table id="tabela-atividades">
        <thead>
            <tr>
                <th>Técnico</th><th>Início</th><th>Fim</th><th>Local/Obra</th><th>Serviço</th><th>Ações</th>
            </tr>
        </thead>
        <tbody id="corpo-tabela"></tbody>
    </table>

    <script>
        const SUPABASE_URL = 'https://dunondjiqawovisnwavg.supabase.co';
        // Usa a mesma chave que tens no teu outro ficheiro
        const SUPABASE_ANON_KEY = 'sb_publishable_WekrBSs5JOjnJ1SGxFvmKQ_3v6AnBMs'; 
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function carregarAtividades() {
    const { data: { session } } = await sbClient.auth.getSession();
    if (!session) { window.location.href = 'index.html'; return; }
    document.getElementById('utilizador-info').innerText = session.user.email;

    // A. Adiciona .range(0, 1000) se tiveres muitas linhas para remover o limite de 50
    const { data, error } = await sbClient
        .from('atividades')
        .select('*')
        .order('id', { ascending: false })
.range(0, 1000); // Ordenar pelo ID mais recente

    if (error) { console.error("Erro ao carregar:", error); return; }

    const tbody = document.getElementById('corpo-tabela');
    
    // B. Verifica se os dados existem antes de mapear
    if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6">Nenhuma atividade encontrada.</td></tr>';
        return;
    }

tbody.innerHTML = data.map(a => `
    <tr id="row-${a.id}">
        <td>${a.tecnico || ''}</td>
        <td>${a.data_hora_inicio || ''}</td>
        <td>${a.data_hora_fim || ''}</td>
        <td>${a.local_obra || ''}</td>
        <td>${a.servico || ''}</td>
        <td>
            <button onclick="editarLinha(${a.id})">Editar</button>
            <button class="btn-apagar" onclick="apagarLinha(${a.id})">Apagar</button>
        </td>
    </tr>`).join('');
}

        window.editarLinha = function(id) {
            const row = document.getElementById(`row-${id}`);
            const cells = row.querySelectorAll('td');
            for (let i = 0; i < cells.length - 1; i++) {
                const val = cells[i].innerText;
                cells[i].innerHTML = `<input type="text" value="${val}" id="input-${id}-${i}">`;
            }
            cells[cells.length - 1].innerHTML = `<button class="btn-salvar" onclick="salvarLinha(${id})">Salvar</button>`;
        };

window.salvarLinha = async function(id) {
    const row = document.getElementById(`row-${id}`);
    const inputs = row.querySelectorAll('input');
    
    // Função auxiliar para validar datas
    const formatarData = (valor) => (valor && valor.trim() !== '-' ? valor : null);

    const updates = {
        tecnico: inputs[0].value,
        // Usamos a função para garantir que se for "-" ou vazio, envia null
        data_hora_inicio: formatarData(inputs[1].value),
        data_hora_fim: formatarData(inputs[2].value),
        local_obra: inputs[3].value,
        servico: inputs[4].value
    };

    const { error } = await sbClient.from('atividades').update(updates).eq('id', id);
    
    if (error) { 
        alert('Erro ao salvar: ' + error.message); 
    } else { 
        alert('Guardado com sucesso!'); 
        carregarAtividades(); 
    }
};

        window.apagarLinha = async function(id) {
            if (confirm('Apagar esta atividade?')) {
                const { error } = await sbClient.from('atividades').delete().eq('id', id);
                if (!error) carregarAtividades();
            }
        };

        carregarAtividades();
    </script>
</body>
</html>
