<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registo de Atividade</title>
  <link rel="icon" type="image/jpeg" href="favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; font-family: Arial, sans-serif; color: white; padding: 30px; }
    .container { max-width: 900px; margin: auto; background: #1e293b; padding: 35px; border-radius: 18px; box-shadow: 0 0 30px rgba(0,0,0,0.4); }
    .header-area { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .user-info { color: #94a3b8; font-size: 0.9em; margin-bottom: 20px; }
    h1 { font-size: 34px; }
    .btn-voltar { background: #334155; color: white; text-decoration: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: bold; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .full { grid-column: 1 / -1; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }
    input, textarea { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #334155; color: white; font-size: 15px; }
    input[type="file"] { padding: 10px; cursor: pointer; }
    button { width: 100%; margin-top: 25px; padding: 16px; border: none; border-radius: 10px; background: #2563eb; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
    button:disabled { background: #475569; cursor: not-allowed; }
    .success { display: none; margin-top: 20px; background: #065f46; padding: 15px; border-radius: 10px; text-align: center; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-area">
      <h1>Registo de Atividade</h1>
      <a href="index.html" class="btn-voltar">⬅ Voltar</a>
    </div>
    
    <div class="user-info">
      Utilizador: <span id="user-display" style="color: #60a5fa;">A carregar...</span>
    </div>

    <form id="formularioAtividade">
      <div class="grid">
        <div class="full">
          <label>Nome do Técnico *</label>
          <input type="text" name="Tecnico_Nome" required>
        </div>
        <div>
          <label>Início *</label>
          <input type="datetime-local" id="dataHoraInicio" name="Atividade_Inicio" required>
        </div>
        <div>
          <label>Fim *</label>
          <input type="datetime-local" id="dataHoraFim" name="Atividade_Fim" required>
        </div>
        <div class="full">
          <label>Local / Obra *</label>
          <input type="text" name="Atividade_Local_Obra" required>
        </div>
        <div class="full">
          <label>Serviço realizado *</label>
          <textarea name="Atividade_Servico" required></textarea>
        </div>
        <div class="full">
          <label>Anexar Foto</label>
          <input type="file" id="fotoAnexo" name="anexo" accept="image/*">
        </div>
      </div>
      <button type="submit" id="btnEnviar">Gravar Atividade</button>
    </form>

    <div class="success" id="successMessage">✅ Atividade guardada com sucesso!</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://dunondjiqawovisnwavg.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_WekrBSs5JOjnJ1SGxFvmKQ_3v6AnBMs';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    window.onload = async () => {
      const { data: { user }, error } = await supabaseClient.auth.getUser();
      
      if (error || !user) {
        window.location.href = 'index.html';
      } else {
        document.getElementById('user-display').innerText = user.email;
        definirDataAtual();
      }
    };

    function definirDataAtual() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById("dataHoraInicio").value = now.toISOString().slice(0, 16);
    }

    const form = document.getElementById("formularioAtividade");
    const btnEnviar = document.getElementById("btnEnviar");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      btnEnviar.disabled = true;
      btnEnviar.innerText = "A carregar foto e a gravar...";
      
      let imageUrl = null;
      const fileInput = document.getElementById("fotoAnexo");

      // 1. Se houver ficheiro selecionado, faz o upload para o Supabase Storage (bucket "anexos")
      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 9)}.${fileExt}`;
        const filePath = `${fileName}`;

        const { error: uploadError } = await supabaseClient.storage
          .from('anexos')
          .upload(filePath, file);

        if (uploadError) {
          alert("Erro ao carregar a imagem: " + uploadError.message);
          btnEnviar.disabled = false;
          btnEnviar.innerText = "Gravar Atividade";
          return;
        }

        // Obter o URL público da imagem carregada
        const { data: publicUrlData } = supabaseClient.storage
          .from('anexos')
          .getPublicUrl(filePath);

        imageUrl = publicUrlData.publicUrl;
      }

      // 2. Mapeamento dos campos para guardar na tabela "atividades"
      const dadosParaEnviar = {
        tecnico: form.Tecnico_Nome.value,
        data_hora_inicio: form.Atividade_Inicio.value,
        data_hora_fim: form.Atividade_Fim.value,
        local_obra: form.Atividade_Local_Obra.value,
        servico: form.Atividade_Servico.value,
        anexo: imageUrl // URL público da imagem guardado na coluna "anexo"
      };

      // 3. Gravar na tabela do Supabase
      const { error } = await supabaseClient
        .from('atividades')
        .insert([dadosParaEnviar]);

      if (error) {
        alert("Erro ao gravar no Supabase: " + error.message);
        btnEnviar.disabled = false;
        btnEnviar.innerText = "Gravar Atividade";
        return;
      }

      // 4. Feedback visual de sucesso, reset do form e redefinição da data atual
      document.getElementById("successMessage").style.display = "block";
      form.reset();
      definirDataAtual();
      setTimeout(() => { 
        document.getElementById("successMessage").style.display = "none"; 
      }, 5000);
      
      btnEnviar.disabled = false;
      btnEnviar.innerText = "Gravar Atividade";
    });
  </script>
</body>
</html>
