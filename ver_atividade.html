<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico de Atividades</title>
  <link rel="icon" type="image/jpeg" href="favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; font-family: Arial, sans-serif; color: white; padding: 30px; display: none; }
    .container { max-width: 1200px; margin: auto; background: #1e293b; padding: 35px; border-radius: 18px; box-shadow: 0 0 30px rgba(0,0,0,0.4); }
    .header-area { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; gap: 15px; }
    h1 { font-size: 30px; }
    .btn-voltar { background: #334155; color: white; text-decoration: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: bold; transition: 0.2s; white-space: nowrap; }
    .btn-voltar:hover { background: #475569; }
    .table-responsive { width: 100%; overflow-x: auto; border-radius: 10px; margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; min-width: 800px; }
    th, td { padding: 14px 18px; border-bottom: 1px solid #334155; vertical-align: middle; }
    th { background: #334155; color: #cbd5e1; font-weight: bold; }
    tr:hover { background: #24334d; }
    .btn-editar { background: #eab308; color: black; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-right: 5px; }
    .btn-editar:hover { opacity: 0.85; }
    .btn-eliminar { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-eliminar:hover { opacity: 0.85; }
    .loading { text-align: center; padding: 40px; color: #94a3b8; font-size: 16px; }
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
    .modal-content { background: #1e293b; padding: 30px; border-radius: 15px; width: 90%; max-width: 600px; border: 1px solid #334155; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    .modal h2 { margin-bottom: 20px; font-size: 22px; color: #cbd5e1; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #94a3b8; }
    .form-group input, .form-group textarea { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #334155; color: white; font-size: 14px; }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .btn-cancelar { background: #475569; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn-guardar { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn-guardar:hover { background: #1d4ed8; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-area">
      <h1>Histórico de Atividades</h1>
      <a href="index.html" class="btn-voltar">⬅ Voltar ao Menu</a>
    </div>

    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>Técnico</th>
            <th>Início</th>
            <th>Fim</th>
            <th>Local / Obra</th>
            <th>Serviço Realizado</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="corpoTabela">
          <tr>
            <td colspan="6" class="loading">A carregar atividades...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <h2>✏️ Editar Registo de Atividade</h2>
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>Técnico</label>
        <input type="text" id="editTecnico">
      </div>
      <div class="form-group">
        <label>Data/Hora Início</label>
        <input type="datetime-local" id="editInicio">
      </div>
      <div class="form-group">
        <label>Data/Hora Fim</label>
        <input type="datetime-local" id="editFim">
      </div>
      <div class="form-group">
        <label>Local / Obra</label>
        <input type="text" id="editLocal">
      </div>
      <div class="form-group">
        <label>Serviço Realizado</label>
        <textarea id="editServico"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
        <button class="btn-guardar" onclick="guardarEdicao()">Guardar Alterações</button>
      </div>
    </div>
  </div>

  <script>
    const SB_URL = 'https://dunondjiqawovisnwavg.supabase.co/rest/v1/atividades';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1bm9uZGppcWF3b3Zpc253YXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTk3MjIsImV4cCI6MjA5NTYzNTcyMn0.KY5xnuHCixsO0a4yCzXP6CmO8e08v1wrDjoGCL-LTro';

    const corpoTabela = document.getElementById("corpoTabela");
    let tokenAdmin = sessionStorage.getItem("admin_code");
    let atividadesLista = [];

    document.addEventListener("DOMContentLoaded", function() {
      if (!tokenAdmin) {
        alert("Acesso negado. Por favor insira o código no menu inicial.");
        window.location.href = "index.html";
        return;
      }
      document.body.style.display = "block";
      carregarAtividades();
    });

    function formatarData(dataISO) {
      if (!dataISO) return "-";
      const data = new Date(dataISO);
      return data.toLocaleString('pt-PT', { hourCycle: 'h23', day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    async function carregarAtividades() {
      try {
        const response = await fetch(`${SB_URL}?order=created_at.desc`, {
          method: 'GET',
          headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
        });
        if (!response.ok) throw new Error();
        atividadesLista = await response.json();

        if (atividadesLista.length === 0) {
          corpoTabela.innerHTML = `<tr><td colspan="6" class="loading">Nenhuma atividade registada.</td></tr>`;
          return;
        }

        corpoTabela.innerHTML = "";
        atividadesLista.forEach(atv => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td><b>${atv.tecnico || '-'}</b></td>
            <td>${formatarData(atv.data_hora_inicio)}</td>
            <td>${formatarData(atv.data_hora_fim)}</td>
            <td>${atv.local_obra || '-'}</td>
            <td>${atv.servico || '-'}</td>
            <td>
              <button class="btn-editar" onclick="abrirModalEditar(${atv.id})">✏️ Editar</button>
              <button class="btn-eliminar" onclick="eliminarAtividade(${atv.id})">❌ Eliminar</button>
            </td>
          `;
          corpoTabela.appendChild(tr);
        });
      } catch (err) {
        corpoTabela.innerHTML = `<tr><td colspan="6" class="loading" style="color: #ef4444;">Erro ao carregar dados. Código de acesso incorreto.</td></tr>`;
      }
    }

    function abrirModalEditar(id) {
      const atv = atividadesLista.find(item => item.id === id);
      if (!atv) return;
      document.getElementById("editId").value = atv.id;
      document.getElementById("editTecnico").value = atv.tecnico || '';
      document.getElementById("editInicio").value = atv.data_hora_inicio || '';
      document.getElementById("editFim").value = atv.data_hora_fim || '';
      document.getElementById("editLocal").value = atv.local_obra || '';
      document.getElementById("editServico").value = atv.servico || '';
      document.getElementById("editModal").style.display = "flex";
    }

    function fecharModal() { document.getElementById("editModal").style.display = "none"; }

    async function guardarEdicao() {
      const id = document.getElementById("editId").value;
      try {
        const response = await fetch(`${SB_URL}?id=eq.${id}`, {
          method: 'PATCH',
          headers: {
            'apikey': SB_KEY,
            'Authorization': `Bearer ${SB_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal',
            'x-admin-code': tokenAdmin
          },
          body: JSON.stringify({
            tecnico: document.getElementById("editTecnico").value,
            data_hora_inicio: document.getElementById("editInicio").value,
            data_hora_fim: document.getElementById("editFim").value,
            local_obra: document.getElementById("editLocal").value,
            servico: document.getElementById("editServico").value
          })
        });

        if (response.ok) {
          alert("Alterações salvas com sucesso!");
          fecharModal();
          carregarAtividades();
        } else {
          alert("Não tens permissões suficientes para alterar registos.");
        }
      } catch (err) { console.error(err); }
    }

    async function eliminarAtividade(id) {
      if (confirm("Tens a certeza de que queres eliminar permanentemente este registo?")) {
        try {
          const response = await fetch(`${SB_URL}?id=eq.${id}`, {
            method: 'DELETE',
            headers: {
              'apikey': SB_KEY,
              'Authorization': `Bearer ${SB_KEY}`,
              'Prefer': 'return=minimal',
              'x-admin-code': tokenAdmin
            }
          });
          if (response.ok) {
            alert("Registo removido com sucesso.");
            carregarAtividades();
          } else { alert("Erro ao eliminar da base de dados."); }
        } catch (err) { console.error(err); }
      }
    }
  </script>
</body>
</html>
