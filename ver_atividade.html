<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico de Atividades</title>
  <link rel="icon" type="image/jpeg" href="favicon.png">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; font-family: Arial, sans-serif; color: white; padding: 30px; }
    .container { max-width: 1200px; margin: auto; background: #1e293b; padding: 35px; border-radius: 18px; box-shadow: 0 0 30px rgba(0,0,0,0.4); }
    
    .header-area { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; gap: 15px; }
    h1 { font-size: 30px; }
    .btn-voltar { background: #334155; color: white; text-decoration: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: bold; transition: 0.2s; white-space: nowrap; }
    .btn-voltar:hover { background: #475569; }

    .table-responsive { width: 100%; overflow-x: auto; border-radius: 10px; margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; min-width: 800px; }
    th, td { padding: 14px 18px; border-bottom: 1px solid #334155; vertical-align: middle; }
    th { background: #334155; color: #cbd5e1; font-weight: bold; }
    tr:hover { background: #24334d; }
    
    .btn-eliminar { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-eliminar:hover { opacity: 0.85; }
    
    .loading { text-align: center; padding: 40px; color: #94a3b8; font-size: 16px; }
  </style>
</head>

<body>

  <div class="container">
    <div class="header-area">
      <h1>Histórico de Atividades</h1>
      <a href="index.html" class="btn-voltar">⬅ Voltar ao Menu</a>
    </div>

    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>Técnico</th>
            <th>Início</th>
            <th>Fim</th>
            <th>Local / Obra</th>
            <th>Serviço Realizado</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="corpoTabela">
          <tr>
            <td colspan="6" class="loading">A carregar atividades...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // Configurações diretas da API REST do teu projeto
    const SB_URL = 'https://dunondjiqawovisnwavg.supabase.co/rest/v1/atividades';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1bm9uZGppcWF3b3Zpc253YXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTk3MjIsImV4cCI6MjA5NTYzNTcyMn0.KY5xnuHCixsO0a4yCzXP6CmO8e08v1wrDjoGCL-LTro';

    const corpoTabela = document.getElementById("corpoTabela");

    function formatarData(dataISO) {
      if (!dataISO) return "-";
      const data = new Date(dataISO);
      return data.toLocaleString('pt-PT', { hourCycle: 'h23', day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    async function carregarAtividades() {
      try {
        // Pedido HTTP direto ordenando por data de criação mais recente
        const response = await fetch(`${SB_URL}?order=created_at.desc`, {
          method: 'GET',
          headers: {
            'apikey': SB_KEY,
            'Authorization': `Bearer ${SB_KEY}`
          }
        });

        if (!response.ok) throw new Error("Erro na resposta do servidor");

        const dados = await response.json();

        if (dados.length === 0) {
          corpoTabela.innerHTML = `<tr><td colspan="6" class="loading">Nenhuma atividade registada até ao momento.</td></tr>`;
          return;
        }

        corpoTabela.innerHTML = "";
        dados.forEach(atv => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td><b>${atv.tecnico || '-'}</b></td>
            <td>${formatarData(atv.data_hora_inicio)}</td>
            <td>${formatarData(atv.data_hora_fim)}</td>
            <td>${atv.local_obra || '-'}</td>
            <td>${atv.servico || '-'}</td>
            <td>
              <button class="btn-eliminar" onclick="eliminarAtividade(${atv.id})">❌ Eliminar</button>
            </td>
          `;
          corpoTabela.appendChild(tr);
        });

      } catch (err) {
        corpoTabela.innerHTML = `<tr><td colspan="6" class="loading" style="color: #ef4444;">Erro ao carregar os dados. Verifica as políticas do banco de dados.</td></tr>`;
        console.error(err);
      }
    }

    async function eliminarAtividade(id) {
      if (confirm("Desejas eliminar permanentemente este registo de atividade?")) {
        try {
          const response = await fetch(`${SB_URL}?id=eq.${id}`, {
            method: 'DELETE',
            headers: {
              'apikey': SB_KEY,
              'Authorization': `Bearer ${SB_KEY}`,
              'Prefer': 'return=minimal'
            }
          });

          if (response.ok) {
            carregarAtividades();
          } else {
            alert("Não foi possível eliminar a atividade.");
          }
        } catch (err) {
          console.error(err);
        }
      }
    }

    // Inicializar carregamento automático ao abrir a página
    carregarAtividades();
  </script>
</body>
</html>
