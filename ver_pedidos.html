<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Pedidos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/pt.js"></script>

    <link href="https://unpkg.com/tabulator-tables@6.2.1/dist/css/tabulator_midnight.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@6.2.1/dist/js/tabulator.min.js"></script>

    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .btn-voltar { background: #334155; color: white; text-decoration: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: bold; }
        #tabela-pedidos { margin-top: 20px; font-size: 12px; }
        #filtro-pesquisa { width: 300px; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #475569; background: #1e293b; color: white; }
        .urgencia-select, .select-custom { width: 100%; background: transparent; color: white; border: none; cursor: pointer; font-size: 12px; text-align: center; }
        .urgencia-select option, .select-custom option { background: #1e293b; color: white; }
    </style>
</head>
<body>

<div>Utilizador: <strong id="utilizador-info" style="font-weight: bold; color: #60a5fa;">A verificar...</strong></div>

<div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
    <h1 style="margin: 0;">Histórico de Pedidos</h1>
    <div>
        <button onclick="window.location.href='https://franciscosilvamglpt.github.io/TopogfRegisto/registo_pedidos.html'" style="background: #3b82f6; padding: 10px; border:none; color:white; border-radius:5px; cursor:pointer; margin-right: 10px;">➕ Adicionar Pedido</button>
        <button id="btn-filtro-concluidos" onclick="toggleConcluidos()" style="background: #64748b; padding: 10px; border:none; color:white; border-radius:5px; cursor:pointer; margin-right: 10px;">✅ Ocultar Concluídos</button>
        <button onclick="guardarAlteracoes()" style="background: #22c55e; padding: 10px; border:none; color:white; border-radius:5px; cursor:pointer; margin-right: 10px;">💾 Guardar Alterações</button>
        <button onclick="exportarParaExcel()" style="background: #8b5cf6; padding: 10px; border:none; color:white; border-radius:5px; cursor:pointer; margin-right: 10px;">⬇ Exportar Excel</button>
        <a href="index.html" class="btn-voltar">⬅ Voltar</a>
    </div>
</div>

<input type="text" id="filtro-pesquisa" placeholder="🔍 Pesquisar">
<div id="tabela-pedidos"></div>

<script>
    const supabaseUrl = 'https://dunondjiqawovisnwavg.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1bm9uZGppcWF3b3Zpc253YXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTk3MjIsImV4cCI6MjA5NTYzNTcyMn0.KY5xnuHCixsO0a4yCzXP6CmO8e08v1wrDjoGCL-LTro';
    const sbClient = supabase.createClient(supabaseUrl, supabaseKey);

    const dateEditor = function(cell, onRendered, success, cancel) {
        const input = document.createElement("input");
        input.value = cell.getValue();
        onRendered(() => { input.focus(); flatpickr(input, { enableTime: true, dateFormat: "Y-m-d H:i", time_24hr: true, locale: "pt", onClose: (sd, ds) => success(ds) }); });
        return input;
    };

    let table;
    let mostrandoConcluidos = true;

    async function carregarDados() {
        const { data: { session } } = await sbClient.auth.getSession();
        if (!session) { window.location.href = 'login.html'; return; }
        document.getElementById('utilizador-info').innerText = session.user.email;
        const { data } = await sbClient.from('pedidos').select('*');

        table = new Tabulator("#tabela-pedidos", {
            data: data,
            layout: "fitColumns",
            pagination: "local",
            paginationSize: 15,
            rowFormatter: function(row) {
                const data = row.getData();
                const el = row.getElement();
                if (data.estado === "concluido") {
                    el.style.backgroundColor = "#334155";
                    el.style.color = "#94a3b8";
                    el.style.textDecoration = "line-through";
                    el.style.opacity = "0.6";
                } else {
                    el.style.textDecoration = "none";
                    el.style.opacity = "1";
                    el.style.color = "white";
                    if (data.urgencia === "Baixa") el.style.backgroundColor = "rgba(34, 197, 94, 0.2)";
                    else if (data.urgencia === "Média") el.style.backgroundColor = "rgba(234, 179, 8, 0.2)";
                    else if (data.urgencia === "Alta") el.style.backgroundColor = "rgba(239, 68, 68, 0.2)";
                }
            },
            columns: [
                {title: "Técnico", field: "tecnico", editor: "input"},
                {title: "Pedido (Data/Hora)", field: "data_hora_pedido", editor: dateEditor},
                {title: "Requerente", field: "requerente", editor: "input"},
                {title: "Empresa", field: "empresa", editor: "input"},
                {title: "Urgência", field: "urgencia", formatter: function(cell) {
                    const sel = document.createElement("select"); sel.className = "urgencia-select";
                    ["Baixa", "Média", "Alta"].forEach(o => { const op = document.createElement("option"); op.value = o; op.textContent = o; if(cell.getValue()===o) op.selected=true; sel.appendChild(op); });
                    sel.onchange = (e) => { cell.setValue(e.target.value); cell.getRow().reformat(); };
                    return sel;
                }},
                {title: "Via", field: "via", editor: "input"},
                {title: "Local", field: "local_obra", editor: "input"},
                {title: "Concelho", field: "concelho", editor: "input"},
                {title: "Serviço", field: "servico", editor: "input"},
                {title: "Obs", field: "observacao", editor: "input"},
                {title: "Tipo", field: "tipo_trabalho", editor: "input"},
                {title: "Freq", field: "frequencia", editor: "input"},
                {title: "Limite", field: "data_hora_limite", editor: dateEditor},
                {title: "Estado", field: "estado", formatter: function(cell) {
                    const sel = document.createElement("select"); sel.className = "select-custom";
                    ["Pendente", "Concluido"].forEach(o => { const op = document.createElement("option"); op.value = o.toLowerCase(); op.textContent = o; if((cell.getValue()||"").toLowerCase()===o.toLowerCase()) op.selected=true; sel.appendChild(op); });
                    sel.onchange = (e) => { cell.setValue(e.target.value); cell.getRow().reformat(); };
                    return sel;
                }},
                {title: "Conclusão", field: "data_conclusao", editor: dateEditor},
                {title: "🗑️", formatter: function() { return "<button style='background:#ef4444; color:white; border:none; padding:2px 8px; border-radius:3px;'>❌</button>"; }, width: 60, hozAlign: "center", cellClick: function(e, cell) { if(confirm("Apagar?")) { sbClient.from('pedidos').delete().eq('id', cell.getRow().getData().id).then(() => cell.getRow().delete()); } }}
            ]
        });
        document.getElementById("filtro-pesquisa").addEventListener("keyup", aplicarFiltros);
    }

    async function exportarParaExcel() {
        try {
            const response = await fetch('template.xlsx');
            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(await response.arrayBuffer());
            const worksheet = workbook.getWorksheet(1);
            const dados = table.getData();
            const startRow = 5;

            const splitDate = (val) => { const d = new Date(val); return isNaN(d.getTime()) ? {d: "", h: ""} : {d: d, h: d}; };

            dados.forEach((row, i) => {
                const r = startRow + i;
                const p = splitDate(row.data_hora_pedido);
                const l = splitDate(row.data_hora_limite);
                const c = splitDate(row.data_conclusao);

                worksheet.getCell(r, 3).value = row.tecnico;
                worksheet.getCell(r, 4).value = p.d; worksheet.getCell(r, 5).value = p.h;
                worksheet.getCell(r, 6).value = row.requerente;
                worksheet.getCell(r, 7).value = row.empresa;
                worksheet.getCell(r, 8).value = row.urgencia;
                worksheet.getCell(r, 9).value = row.via;
                worksheet.getCell(r, 10).value = row.local_obra;
                worksheet.getCell(r, 11).value = row.concelho;
                worksheet.getCell(r, 12).value = row.servico;
                worksheet.getCell(r, 13).value = row.observacao;
                worksheet.getCell(r, 14).value = row.tipo_trabalho;
                worksheet.getCell(r, 15).value = row.frequencia;
                worksheet.getCell(r, 16).value = l.d; worksheet.getCell(r, 17).value = l.h;
                worksheet.getCell(r, 18).value = row.estado;
                worksheet.getCell(r, 19).value = c.d; worksheet.getCell(r, 20).value = c.h;

                [4, 5, 16, 17, 19, 20].forEach(col => { 
                    const cell = worksheet.getCell(r, col);
                    if(cell.value instanceof Date) cell.numFmt = [4, 16, 19].includes(col) ? 'dd/mm/yyyy' : 'hh:mm';
                });
            });

            const buffer = await workbook.xlsx.writeBuffer();
            const url = URL.createObjectURL(new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }));
            const link = document.createElement("a"); link.href = url; link.download = "Pedidos_Exportados.xlsx"; link.click();
        } catch (e) { console.error(e); alert("Erro na exportação."); }
    }

    function aplicarFiltros() {
        const input = document.getElementById("filtro-pesquisa").value.toLowerCase();
        table.setFilter(data => Object.values(data).some(v => String(v).toLowerCase().includes(input)) && (mostrandoConcluidos || data.estado !== "concluido"));
    }

    function toggleConcluidos() {
        mostrandoConcluidos = !mostrandoConcluidos;
        document.getElementById("btn-filtro-concluidos").innerText = mostrandoConcluidos ? "✅ Ocultar Concluídos" : "👁️ Mostrar Tudo";
        aplicarFiltros();
    }

    async function guardarAlteracoes() {
        for (const item of table.getData()) {
            await sbClient.from('pedidos').update(item).eq('id', item.id);
        }
        alert("Guardado com sucesso!");
    }

    carregarDados();
</script>
</body>
</html>
