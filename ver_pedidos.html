<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Ver Pedidos</title>
    <!-- Importação do Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <h1>Meus Pedidos</h1>
    <div id="lista-pedidos">A carregar pedidos...</div>

    <script>
        // Configurações do teu projeto (Substitui pelos teus dados reais)
        const supabaseUrl = 'https://dunondjiqawovisnwavg.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1bm9uZGppcWF3b3Zpc253YXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTk3MjIsImV4cCI6MjA5NTYzNTcyMn0.KY5xnuHCixsO0a4yCzXP6CmO8e08v1wrDjoGCL-LTro';
        const supabase = supabaseClient.createClient(supabaseUrl, supabaseKey);

        async function carregarPedidos() {
            // 1. Verifica se o utilizador está autenticado
            const { data: { session } } = await supabase.auth.getSession();
            
            if (!session) {
                // Redirecionar para login se não estiver autenticado
                window.location.href = 'login.html';
                return;
            }

            // 2. Busca os pedidos
            const { data, error } = await supabase
                .from('pedidos')
                .select('*');

            if (error) {
                document.getElementById('lista-pedidos').innerText = 'Erro ao carregar: ' + error.message;
            } else {
                renderizarPedidos(data);
            }
        }

        function renderizarPedidos(pedidos) {
            const container = document.getElementById('lista-pedidos');
            if (pedidos.length === 0) {
                container.innerText = 'Não existem pedidos.';
                return;
            }
            
            let html = '<ul>';
            pedidos.forEach(p => {
                html += `<li>Pedido ID: ${p.id} - Data: ${p.created_at}</li>`;
            });
            html += '</ul>';
            container.innerHTML = html;
        }

        // Executar ao carregar
        carregarPedidos();
    </script>
</body>
</html>
