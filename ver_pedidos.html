<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Pedidos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <link href="https://unpkg.com/tabulator-tables@6.2.1/dist/css/tabulator_midnight.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@6.2.1/dist/js/tabulator.min.js"></script>
    
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .btn-voltar { background: #334155; color: white; text-decoration: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: bold; }
        #tabela-pedidos { margin-top: 20px; font-size: 12px; }
        #filtro-pesquisa { width: 300px; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #475569; background: #1e293b; color: white; }
        .urgencia-select, .select-custom { width: 100%; background: transparent; color: white; border: none; cursor: pointer; font-size: 12px; text-align: center; }
        .urgencia-select option, .select-custom option { background: #1e293b; color: white; }
    </style>
</head>
<body>

    <div>Utilizador: <strong id="utilizador-info" style="font-weight: bold; color: #60a5fa;">A verificar...</strong></div>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
        <h1 style="margin: 0;">Histórico de Pedidos</h1>
        <div>
            <button onclick="window.location.href='https://franciscosilvamglpt.github.io/TopogfRegisto/registo_pedidos.html'" style="background: #3b82f6; padding: 10px; border:none; color:white; border-radius:5px; cursor:pointer; margin-right: 10px;">➕ Adicionar Pedido</button>
            <button id="btn-filtro-concluidos" onclick="toggleConcluidos()" style="background: #64748b; padding: 10px; border:none; color:white; border-radius:5px; cursor:pointer; margin-right: 10px;">✅ Ocultar Concluídos</button>
            <button onclick="guardarAlteracoes()" style="background: #22c55e; padding: 10px; border:none; color:white; border-radius:5px; cursor:pointer; margin-right: 10px;">💾 Guardar Alterações</button>
            <button onclick="exportarParaExcel()" style="background: #8b5cf6; padding: 10px; border:none; color:white; border-radius:5px; cursor:pointer; margin-right: 10px;">⬇ Exportar Excel</button>
            <a href="index.html" class="btn-voltar">⬅ Voltar</a>
        </div>
    </div>

    <input type="text" id="filtro-pesquisa" placeholder="🔍 Pesquisar">
    <div id="tabela-pedidos"></div>

    <script>
        const supabaseUrl = 'https://dunondjiqawovisnwavg.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1bm9uZGppcWF3b3Zpc253YXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTk3MjIsImV4cCI6MjA5NTYzNTcyMn0.KY5xnuHCixsO0a4yCzXP6CmO8e08v1wrDjoGCL-LTro'; 
        const sbClient = supabase.createClient(supabaseUrl, supabaseKey);
        
        let table;
        let mostrandoConcluidos = true;

        async function carregarDados() {
            const { data: { session } } = await sbClient.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }
            document.getElementById('utilizador-info').innerText = session.user.email;

            const { data, error } = await sbClient.from('pedidos').select('*');
            if (error) { console.error(error); return; }

            table = new Tabulator("#tabela-pedidos", {
                data: data,
                layout: "fitColumns",
                pagination: "local",
                paginationSize: 15,
                rowFormatter: function(row) {
                    const urgencia = row.getData().urgencia;
                    if (urgencia === "Baixa") row.getElement().style.backgroundColor = "rgba(34, 197, 94, 0.2)";
                    else if (urgencia === "Média") row.getElement().style.backgroundColor = "rgba(234, 179, 8, 0.2)";
                    else if (urgencia === "Alta") row.getElement().style.backgroundColor = "rgba(239, 68, 68, 0.2)";
                },
                columns: [
                    {title: "Técnico", field: "tecnico", editor: "input"},
                    {title: "Data Pedido", field: "data_hora_pedido", editor: "input"},
                    {title: "Requerente", field: "requerente", editor: "input"},
                    {title: "Empresa", field: "empresa", editor: "input"},
                    {title: "Urgência", field: "urgencia", editor: "input"},
                    {title: "Via", field: "via", editor: "input"},
                    {title: "Local", field: "local_obra", editor: "input"},
                    {title: "Concelho", field: "concelho", editor: "input"},
                    {title: "Serviço", field: "servico", editor: "input"},
                    {title: "Obs", field: "observacao", editor: "input"},
                    {title: "Tipo", field: "tipo_trabalho", editor: "input"},
                    {title: "Freq", field: "frequencia", editor: "input"},
                    {title: "Tempo", field: "tempo_dedicado", editor: "input"},
                    {title: "Limite", field: "data_hora_limite", editor: "input"},
                    {title: "Estado", field: "estado", editor: "input"},
                    {title: "🗑️", formatter: function() { return "<button style='background:#ef4444; color:white; border:none; padding:2px 8px; border-radius:3px;'>❌</button>"; }, width: 80, hozAlign: "center", cellClick: function(e, cell) {
                        if(confirm("Apagar este registo?")) {
                            const id = cell.getRow().getData().id;
                            sbClient.from('pedidos').delete().eq('id', id).then(() => cell.getRow().delete());
                        }
                    }}
                ]
            });
            document.getElementById("filtro-pesquisa").addEventListener("keyup", aplicarFiltros);
        }

        async function exportarParaExcel() {
            try {
                const response = await fetch('template.xlsx');
                const arrayBuffer = await response.arrayBuffer();
                const workbook = new ExcelJS.Workbook();
                await workbook.xlsx.load(arrayBuffer);
                const worksheet = workbook.getWorksheet(1);

                const dados = table.getData();
                const startRow = 5; 

                dados.forEach((row, index) => {
                    const rowNumber = startRow + index;
                    const separar = (str) => {
                        if (!str) return ["", ""];
                        const dataHora = str.toString().replace('T', ' '); 
                        const [data, hora] = dataHora.split(' ');
                        return [data, hora ? hora.substring(0, 5) : ""];
                    };

                    const [dataPedido, horaPedido] = separar(row.data_hora_pedido);
                    const [dataLimite, horaLimite] = separar(row.data_hora_limite);

                    // Mapeamento baseado na sua estrutura visual:
                    worksheet.getCell(rowNumber, 3).value = row.tecnico;       // C
                    worksheet.getCell(rowNumber, 4).value = dataPedido;       // D
                    worksheet.getCell(rowNumber, 5).value = horaPedido;       // E
                    worksheet.getCell(rowNumber, 6).value = row.requerente;   // F
                    worksheet.getCell(rowNumber, 7).value = row.empresa;      // G
                    worksheet.getCell(rowNumber, 8).value = row.urgencia;     // H
                    worksheet.getCell(rowNumber, 9).value = row.via;          // I
                    worksheet.getCell(rowNumber, 10).value = row.local_obra;  // J
                    worksheet.getCell(rowNumber, 11).value = row.concelho;    // K
                    worksheet.getCell(rowNumber, 12).value = row.servico;     // L
                    worksheet.getCell(rowNumber, 13).value = row.observacao;  // M
                    worksheet.getCell(rowNumber, 14).value = row.tipo_trabalho;// N
                    worksheet.getCell(rowNumber, 15).value = row.frequencia;  // O
                    worksheet.getCell(rowNumber, 16).value = row.tempo_dedicado; // P
                    worksheet.getCell(rowNumber, 17).value = dataLimite;      // Q
                    worksheet.getCell(rowNumber, 18).value = horaLimite;      // R
                });

                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = "Pedidos_Exportados.xlsx";
                link.click();
            } catch (error) {
                console.error("Erro:", error);
                alert("Erro ao exportar. Verifique se o 'template.xlsx' existe.");
            }
        }

        function aplicarFiltros() {
            const input = document.getElementById("filtro-pesquisa").value.toLowerCase();
            table.setFilter(function(data) {
                return Object.values(data).some(val => String(val).toLowerCase().includes(input));
            });
        }

        function toggleConcluidos() {
            mostrandoConcluidos = !mostrandoConcluidos;
            const btn = document.getElementById("btn-filtro-concluidos");
            btn.innerText = mostrandoConcluidos ? "✅ Ocultar Concluídos" : "👁️ Mostrar Tudo";
            table.setFilter(data => mostrandoConcluidos ? true : data.estado !== "Concluido");
        }

        async function guardarAlteracoes() {
            const dados = table.getData();
            for (const item of dados) {
                await sbClient.from('pedidos').update({
                    tecnico: item.tecnico, data_hora_pedido: item.data_hora_pedido, requerente: item.requerente, 
                    empresa: item.empresa, urgencia: item.urgencia, via: item.via, local_obra: item.local_obra, 
                    concelho: item.concelho, servico: item.servico, observacao: item.observacao, 
                    tipo_trabalho: item.tipo_trabalho, frequencia: item.frequencia, tempo_dedicado: item.tempo_dedicado, 
                    data_hora_limite: item.data_hora_limite, estado: item.estado
                }).eq('id', item.id);
            }
            alert("Dados guardados!");
        }

        carregarDados();
    </script>
</body>
</html>
