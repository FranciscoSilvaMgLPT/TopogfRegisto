<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Pedidos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/pt.js"></script>

    <link href="https://unpkg.com/tabulator-tables@6.2.1/dist/css/tabulator_midnight.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/tabulator-tables@6.2.1/dist/js/tabulator.min.js"></script>

    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .btn-voltar { background: #334155; color: white; text-decoration: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: bold; }
        #tabela-pedidos { margin-top: 20px; font-size: 12px; }
        #filtro-pesquisa { width: 300px; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #475569; background: #1e293b; color: white; }
        .urgencia-select, .select-custom { width: 100%; background: transparent; color: white; border: none; cursor: pointer; font-size: 12px; text-align: center; }
        .urgencia-select option, .select-custom option { background: #1e293b; color: white; }
    </style>
</head>
<body>

<div>Utilizador: <strong id="utilizador-info" style="font-weight: bold; color: #60a5fa;">A verificar...</strong></div>

<div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
    <h1 style="margin: 0;">Histórico de Pedidos</h1>
    <div>
        <button onclick="window.location.href='https://franciscosilvamglpt.github.io/TopogfRegisto/registo_pedidos.html'" style="background: #3b82f6; padding: 10px; border:none; color:white; border-radius:5px; cursor:pointer; margin-right: 10px;">➕ Adicionar Pedido</button>
        <button id="btn-filtro-concluidos" onclick="toggleConcluidos()" style="background: #64748b; padding: 10px; border:none; color:white; border-radius:5px; cursor:pointer; margin-right: 10px;">✅ Ocultar Concluídos</button>
        <button onclick="guardarAlteracoes()" style="background: #22c55e; padding: 10px; border:none; color:white; border-radius:5px; cursor:pointer; margin-right: 10px;">💾 Guardar Alterações</button>
        <button onclick="exportarParaExcel()" style="background: #8b5cf6; padding: 10px; border:none; color:white; border-radius:5px; cursor:pointer; margin-right: 10px;">⬇ Exportar Excel</button>
        <a href="index.html" class="btn-voltar">⬅ Voltar</a>
    </div>
</div>

<input type="text" id="filtro-pesquisa" placeholder="🔍 Pesquisar">
<div id="tabela-pedidos"></div>

<script>
    const supabaseUrl = 'https://dunondjiqawovisnwavg.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1bm9uZGppcWF3b3Zpc253YXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTk3MjIsImV4cCI6MjA5NTYzNTcyMn0.KY5xnuHCixsO0a4yCzXP6CmO8e08v1wrDjoGCL-LTro';
    const sbClient = supabase.createClient(supabaseUrl, supabaseKey);

    let table;
    let mostrandoConcluidos = true;

    const dataFormatter = (cell) => {
        const val = cell.getValue();
        if (!val) return "";
        const data = new Date(val);
        return data.toLocaleDateString("pt-PT") + " " + data.toLocaleTimeString("pt-PT", {hour: '2-digit', minute:'2-digit'});
    };

    const dateEditor = function(cell, onRendered, success, cancel) {
        const input = document.createElement("input");
        input.style.width = "100%";
        input.value = cell.getValue();
        onRendered(function() {
            input.focus();
            flatpickr(input, { enableTime: true, dateFormat: "Y-m-d H:i", time_24hr: true, locale: "pt", onClose: (sd, ds) => success(ds) });
        });
        return input;
    };

    async function carregarDados() {
        const { data: { session } } = await sbClient.auth.getSession();
        if (!session) { window.location.href = 'login.html'; return; }
        document.getElementById('utilizador-info').innerText = session.user.email;

        const { data } = await sbClient.from('pedidos').select('*');

        table = new Tabulator("#tabela-pedidos", {
            data: data,
            layout: "fitColumns",
            pagination: "local",
            paginationSize: 15,
            rowFormatter: function(row) {
                const data = row.getData();
                const urgencia = data.urgencia;
                const estado = (data.estado || "").toLowerCase();
                const el = row.getElement();

                // Reset estilos
                el.style.backgroundColor = "";
                el.style.color = "white";
                el.style.opacity = "1";

                // Urgência
                if (urgencia === "Baixa") el.style.backgroundColor = "rgba(34, 197, 94, 0.1)";
                else if (urgencia === "Média") el.style.backgroundColor = "rgba(234, 179, 8, 0.1)";
                else if (urgencia === "Alta") el.style.backgroundColor = "rgba(239, 68, 68, 0.1)";

                // Estilo Concluído
                if (estado === "concluido") {
                    el.style.backgroundColor = "#e2e8f0"; // Cinza claro para dar contraste
                    el.style.color = "black"; // Texto preto
                }
            },
            columns: [
                {title: "Técnico", field: "tecnico", editor: "input"},
                {title: "Data Pedido", field: "data_hora_pedido", editor: dateEditor, formatter: dataFormatter},
                {title: "Requerente", field: "requerente", editor: "input"},
                {title: "Empresa", field: "empresa", editor: "input"},
                {title: "Urgência", field: "urgencia", formatter: function(cell) {
                    const select = document.createElement("select");
                    select.className = "urgencia-select";
                    ["Baixa", "Média", "Alta"].forEach(opt => {
                        const el = document.createElement("option");
                        el.value = opt; el.textContent = opt;
                        if (cell.getValue() === opt) el.selected = true;
                        select.appendChild(el);
                    });
                    select.onchange = (e) => { cell.setValue(e.target.value); table.redraw(); };
                    return select;
                }},
                {title: "Via", field: "via", editor: "input"},
                {title: "Local", field: "local_obra", editor: "input"},
                {title: "Concelho", field: "concelho", editor: "input"},
                {title: "Serviço", field: "servico", editor: "input"},
                {title: "Obs", field: "observacao", editor: "input"},
                {title: "Tipo", field: "tipo_trabalho", editor: "input"},
                {title: "Freq", field: "frequencia", editor: "input"},
                {title: "Limite", field: "data_hora_limite", editor: dateEditor, formatter: dataFormatter},
                {title: "Estado", field: "estado", formatter: function(cell) {
                    const select = document.createElement("select");
                    select.className = "select-custom";
                    ["Pendente", "Concluido"].forEach(opt => {
                        const el = document.createElement("option");
                        el.value = opt.toLowerCase(); el.textContent = opt;
                        if ((cell.getValue() || "").toLowerCase() === opt.toLowerCase()) el.selected = true;
                        select.appendChild(el);
                    });
                    select.onchange = (e) => { 
                        cell.setValue(e.target.value); 
                        cell.getRow().reformat(); // Atualiza a linha na hora
                        aplicarFiltros(); 
                    };
                    return select;
                }},
                {title: "Data Conclusão", field: "data_conclusao", editor: dateEditor, formatter: dataFormatter},
                {title: "🗑️", formatter: function() { return "<button style='background:#ef4444; color:white; border:none; padding:2px 8px; border-radius:3px;'>❌</button>"; }, width: 60, hozAlign: "center", cellClick: function(e, cell) {
                    if(confirm("Apagar?")) { const id = cell.getRow().getData().id; sbClient.from('pedidos').delete().eq('id', id).then(() => cell.getRow().delete()); }
                }}
            ]
        });
        document.getElementById("filtro-pesquisa").addEventListener("keyup", aplicarFiltros);
    }

    function aplicarFiltros() {
        const input = document.getElementById("filtro-pesquisa").value.toLowerCase();
        table.setFilter(function(data) {
            const matchTexto = Object.values(data).some(val => String(val).toLowerCase().includes(input));
            const estado = (data.estado || "").toLowerCase();
            const mostrar = mostrandoConcluidos ? true : estado !== "concluido";
            return matchTexto && mostrar;
        });
    }

    function toggleConcluidos() {
        mostrandoConcluidos = !mostrandoConcluidos;
        const btn = document.getElementById("btn-filtro-concluidos");
        btn.innerText = mostrandoConcluidos ? "✅ Ocultar Concluídos" : "👁️ Mostrar Tudo";
        btn.style.backgroundColor = mostrandoConcluidos ? "#64748b" : "#f59e0b";
        aplicarFiltros();
    }

    async function guardarAlteracoes() {
        const dados = table.getData();
        for (const item of dados) {
            await sbClient.from('pedidos').update({
                tecnico: item.tecnico, data_hora_pedido: item.data_hora_pedido, requerente: item.requerente,
                empresa: item.empresa, urgencia: item.urgencia, via: item.via, local_obra: item.local_obra,
                concelho: item.concelho, servico: item.servico, observacao: item.observacao,
                tipo_trabalho: item.tipo_trabalho, frequencia: item.frequencia, data_hora_limite: item.data_hora_limite,
                estado: item.estado, data_conclusao: item.data_conclusao
            }).eq('id', item.id);
        }
        alert("Guardado com sucesso!");
    }

    async function exportarParaExcel() {
        const workbook = new ExcelJS.Workbook();
        const response = await fetch('template.xlsx');
        await workbook.xlsx.load(await response.arrayBuffer());
        const worksheet = workbook.getWorksheet(1);
        const dados = table.getData();

        dados.forEach((row, index) => {
            const rowNumber = 5 + index;
            worksheet.getCell(rowNumber, 3).value = row.tecnico;
            worksheet.getCell(rowNumber, 6).value = row.requerente;
            worksheet.getCell(rowNumber, 7).value = row.empresa;
            worksheet.getCell(rowNumber, 8).value = row.urgencia;
            worksheet.getCell(rowNumber, 9).value = row.via;
            worksheet.getCell(rowNumber, 10).value = row.local_obra;
            worksheet.getCell(rowNumber, 11).value = row.concelho;
            worksheet.getCell(rowNumber, 12).value = row.servico;
            worksheet.getCell(rowNumber, 13).value = row.observacao;
            worksheet.getCell(rowNumber, 14).value = row.tipo_trabalho;
            worksheet.getCell(rowNumber, 15).value = row.frequencia;
            worksheet.getCell(rowNumber, 18).value = row.estado;

            const preencherDataHora = (valor, colData, colHora) => {
                if (valor) {
                    const d = new Date(valor);
                    const cellData = worksheet.getCell(rowNumber, colData);
                    cellData.value = d;
                    cellData.numFmt = 'dd/mm/yyyy'; 
                    worksheet.getCell(rowNumber, colHora).value = d.toLocaleTimeString("pt-PT", {hour: '2-digit', minute:'2-digit'});
                }
            };
            preencherDataHora(row.data_hora_pedido, 4, 5);
            preencherDataHora(row.data_hora_limite, 16, 17);
            preencherDataHora(row.data_conclusao, 19, 20);
        });

        const buffer = await workbook.xlsx.writeBuffer();
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([buffer], {type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"}));
        link.download = "Pedidos_Exportados.xlsx";
        link.click();
    }

    carregarDados();
</script>
</body>
</html>
