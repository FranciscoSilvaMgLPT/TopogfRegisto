  <style>

    .btn-voltar:hover { background: #475569; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .full { grid-column: 1 / -1; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }

      <input type="hidden" name="08_Concelho" id="hiddenConcelho">
      <div class="grid">

        <div class="full"><label>Tempo Dedicado ao Trabalho (S/Deslocação)</label><input type="text" name="13_Tempo_Dedicado" id="tempoDedicadoInput" placeholder="Ex: 2h, 1 dia inteiro"></div>
        <div><label>Data Limite de Resposta *</label><input type="datetime-local" id="dataHoraLimInput" required></div>

      <input type="hidden" name="14_Data_Limite" id="hiddenDataLim">
