<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registo de Pedidos</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; font-family: Arial, sans-serif; color: white; padding: 30px; }
    .container { max-width: 900px; margin: auto; background: #1e293b; padding: 35px; border-radius: 18px; box-shadow: 0 0 30px rgba(0,0,0,0.4); }
    .header-area { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .user-info { color: #94a3b8; font-size: 0.9em; margin-bottom: 20px; }
    h1 { font-size: 34px; }
    .btn-voltar { background: #334155; color: white; text-decoration: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: bold; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .full { grid-column: 1 / -1; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }
    input, textarea, select { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #334155; color: white; font-size: 16px; }
    .tecnico-picker { background:#334155; padding:14px; border-radius:10px; min-height: 50px; display: flex; align-items: center; justify-content: space-around; flex-wrap: wrap; gap: 10px; }
    .tecnico-picker label { display:flex; align-items:center; gap:8px; cursor:pointer; margin-bottom: 0; font-size: 15px; color: white; }
    .tecnico-picker input[type="checkbox"] { width: auto; }
    button { width: 100%; margin-top: 25px; padding: 16px; border: none; border-radius: 10px; background: #2563eb; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
    button:disabled { background: #475569; cursor: not-allowed; }
    .success { display: none; margin-top: 20px; background: #065f46; padding: 15px; border-radius: 10px; text-align: center; }

    /* Ajuste para dispositivos móveis */
    @media (max-width: 640px) {
        body { padding: 15px; }
        .container { padding: 20px; border-radius: 14px; }
        h1 { font-size: 24px; }
        .grid { grid-template-columns: 1fr; gap: 12px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-area">
      <h1>Registo de Pedidos</h1>
      <a href="index.html" class="btn-voltar">⬅ Voltar</a>
    </div>

    <div class="user-info">Utilizador: <span id="user-display" style="color: #60a5fa;">A carregar...</span></div>

    <form id="formulario">
      <input type="hidden" name="data_conclusao" value="">

      <div class="grid">
        <div>
          <label>Nome do Técnico *</label>
          <div class="tecnico-picker">
            <label>
              <input type="checkbox" name="tecnico" value="Daniel P" class="tecnicoCheck">
              Daniel P
            </label>
            <label>
              <input type="checkbox" name="tecnico" value="Francisco S" class="tecnicoCheck">
              Francisco S
            </label>
          </div>
        </div>
        <div><label>Data + Hora do Pedido *</label><input type="datetime-local" id="dataHoraPedido" name="data_hora_pedido" required></div>
        <div><label>Requerente *</label><input type="text" name="requerente" required></div>
        <div><label>Empresa *</label>
          <select name="empresa" required>
            <option value="">Selecionar</option>
            <option value="CCR ENG&CONST">CCR ENG&CONST</option>
            <option value="CCR-INVEST">CCR-INVEST</option>
            <option value="GROWNOR">GROWNOR</option>
            <option value="WEST-VIEW">WEST-VIEW</option>
            <option value="GRAU-ON">GRAU-ON</option>
            <option value="FERCAYO">FERCAYO</option>
            <option value="DECIBOLT">DECIBOLT</option>
            <option value="INTERNO">INTERNO</option>
            <option value="EXTERNO">EXTERNO</option>
          </select>
        </div>
        <div><label>Via de Comunicação *</label>
          <select id="viaSelect" name="via" required>
            <option value="Chamada">Chamada</option>
            <option value="Email">Email</option>
            <option value="Whatsapp">Whatsapp</option>
            <option value="Presencial">Presencial</option>
            <option value="Outros">Outros</option>
          </select>
        </div>
        <div id="campoOutroDiv" style="display: none;">
          <label>Especifique via "Outros" *</label>
          <input type="text" id="inputOutro" name="via_outro">
        </div>
        
        <div><label>Urgência</label>
          <select name="urgencia">
            <option value="Selecionar">Selecionar</option>
            <option value="Baixa">Baixa 🟢</option>
            <option value="Média">Média 🟡</option>
            <option value="Alta">Alta 🔴</option>
          </select>
        </div>

        <div><label>Local / Obra *</label><input type="text" name="local_obra" required></div>
        <div><label>Nº Obra</label><input type="text" name="numero_obra"></div>
        <div><label>Concelho *</label><input type="text" name="concelho" required></div>
        <div class="full"><label>Serviço solicitado *</label><textarea name="servico" required></textarea></div>
        <div class="full"><label>Observação</label><textarea name="observacao"></textarea></div>
        <div><label>Tipo de Trabalho *</label>
          <select name="tipo_trabalho" required>
            <option value="Lev. Topográfico">Lev. Topográfico</option>
            <option value="Monitorização">Monitorização</option>
            <option value="Implantação">Implantação</option>
            <option value="Gabinete / Estudos">Gabinete / Estudos</option>
          </select>
        </div>
        <div><label>Frequência *</label>
          <select name="frequencia" required>
            <option value="Única">Única</option>
            <option value="Contínua">Contínua</option>
            <option value="Diária">Diária</option>
            <option value="Semanal">Semanal</option>
            <option value="Mensal">Mensal</option>
            <option value="Trimestral">Trimestral</option>
          </select>
        </div>
        <div><label>Data Limite *</label><input type="datetime-local" name="data_hora_limite" required></div>
      </div>
      <button type="submit" id="btnEnviar">Enviar Pedido</button>
    </form>
    <div class="success" id="successMessage">✅ Pedido guardado com sucesso!</div>
  </div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const supabaseUrl = 'https://dunondjiqawovisnwavg.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1bm9uZGppcWF3b3Zpc253YXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTk3MjIsImV4cCI6MjA5NTYzNTcyMn0.KY5xnuHCixsO0a4yCzXP6CmO8e08v1wrDjoGCL-LTro';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById("formulario");
    const viaSelect = document.getElementById("viaSelect");
    const campoOutroDiv = document.getElementById("campoOutroDiv");
    const inputOutro = document.getElementById("inputOutro");

    // Preencher data e hora atual no campo "Data + Hora do Pedido"
    function definirDataPedidoAtual() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById("dataHoraPedido").value = now.toISOString().slice(0, 16);
    }

    viaSelect.addEventListener("change", (e) => {
      if (e.target.value === "Outros") {
        campoOutroDiv.style.display = "block";
        inputOutro.required = true;
      } else {
        campoOutroDiv.style.display = "none";
        inputOutro.required = false;
        inputOutro.value = "";
      }
    });

    supabaseClient.auth.getSession().then(({ data }) => {
      if (!data.session) {
        window.location.href = 'index.html';
      } else {
        document.getElementById('user-display').innerText = data.session.user.email;
        definirDataPedidoAtual();
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById("btnEnviar");
      btn.disabled = true; 
      btn.innerText = "A gravar...";

      const formData = new FormData(form);
      const supabaseData = Object.fromEntries(formData.entries());
      
      // Recolher múltiplos checkboxes de técnicos se aplicável
      const tecnicosSelecionados = Array.from(document.querySelectorAll('.tecnicoCheck:checked'))
        .map(cb => cb.value);
      if (tecnicosSelecionados.length > 0) {
        supabaseData.tecnico = tecnicosSelecionados.join(', ');
      }

      if (supabaseData.via === "Outros") {
        supabaseData.via = "Outro: " + supabaseData.via_outro;
      }
      
      const dbData = { ...supabaseData };
      delete dbData.via_outro;

      if (!dbData.data_conclusao || dbData.data_conclusao.trim() === "") {
        delete dbData.data_conclusao;
      }

      // Inserção na tabela "pedidos"
      const { error } = await supabaseClient.from('pedidos').insert([dbData]);
      
      if (error) { 
        alert("Erro DB: " + error.message); 
        btn.disabled = false; 
        btn.innerText = "Enviar Pedido";
        return; 
      }

      // Sucesso: mensagem, reset do formulário e redefinição da data atual
      document.getElementById("successMessage").style.display = "block";
      form.reset();
      campoOutroDiv.style.display = "none";
      definirDataPedidoAtual();
      setTimeout(() => { 
        document.getElementById("successMessage").style.display = "none"; 
      }, 5000);
      
      btn.disabled = false; 
      btn.innerText = "Enviar Pedido";
    });
  });
</script>
</body>
</html>
