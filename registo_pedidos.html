<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registo de Pedidos</title>
<link rel="icon" type="image/jpeg" href="favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; font-family: Arial, sans-serif; color: white; padding: 30px; }
    .container { max-width: 900px; margin: auto; background: #1e293b; padding: 35px; border-radius: 18px; box-shadow: 0 0 30px rgba(0,0,0,0.4); }
    .header-area { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .user-info { color: #94a3b8; font-size: 0.9em; margin-bottom: 20px; }
    h1 { font-size: 34px; }
    .btn-voltar { background: #334155; color: white; text-decoration: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: bold; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .full { grid-column: 1 / -1; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }
    input, textarea, select { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #334155; color: white; font-size: 15px; }
    button { width: 100%; margin-top: 25px; padding: 16px; border: none; border-radius: 10px; background: #2563eb; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
    .success { display: none; margin-top: 20px; background: #065f46; padding: 15px; border-radius: 10px; text-align: center; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-area">
      <h1>Registo de Pedidos</h1>
      <a href="index.html" class="btn-voltar">⬅ Voltar</a>
    </div>

    <div class="user-info" >Utilizador: <span id="user-display" style="color: #60a5fa;">A carregar...</span></div>

    <form id="formulario">
      <input type="hidden" name="access_key" value="9f471d61-2558-4df2-a220-0028f59bd975">
      
      <div class="grid">
        <div><label>Nome do Técnico *</label><input type="text" name="tecnico" required></div>
        <div><label>Data + Hora do Pedido *</label><input type="datetime-local" id="dataHoraInput" name="data_hora_pedido" required></div>
        <div><label>Requerente *</label><input type="text" name="requerente" required></div>
        <div><label>Empresa *</label>
          <select name="empresa" required>
            <option value="">Selecionar</option>
            <option value="CCR ENG&CONST">CCR ENG&CONST</option>
            <option value="CCR-INVEST">CCR-INVEST</option>
            <option value="GROWNOR">GROWNOR</option>
            <option value="WEST-VIEW">WEST-VIEW</option>
            <option value="GRAU-ON">GRAU-ON</option>
            <option value="FERCAYO">FERCAYO</option>
            <option value="DECIBOLT">DECIBOLT</option>
   <option value="INTERNO">INTERNO</option>
   <option value="EXTERNO">EXTERNO</option>
          </select>
        </div>
        <div><label>Via de Comunicação *</label>
          <select id="viaSelect" name="via" required>
            <option value="Chamada">Chamada</option>
            <option value="Email">Email</option>
            <option value="Whatsapp">Whatsapp</option>
        <option value="Presencial">Presencial</option>
            <option value="Outro">Outro</option>
          </select>
        </div>
        <div><label>Local / Obra *</label><input type="text" name="local_obra" required></div>
        <div><label>Concelho *</label><input type="text" name="concelho" required></div>
        <div class="full"><label>Serviço solicitado *</label><textarea name="servico" required></textarea></div>
        <div class="full"><label>Observação</label><textarea name="observacao"></textarea></div>
        <div><label>Tipo de Trabalho *</label>
          <select name="tipo_trabalho" required>
            <option value="Lev. Topográfico">Lev. Topográfico</option>
            <option value="Monitorização">Monitorização</option>
            <option value="Implantação">Implantação</option>
<option value="Implantação">Gabinete / Estudos</option>
          </select>
        </div>
        <div><label>Frequência *</label>
          <select name="frequencia" required>
            <option value="Diária">Diária</option>
            <option value="Semanal">Semanal</option>
            <option value="Continua">Continua</option>
          </select>
        </div>
        <div class="full"><label>Tempo Dedicado</label><input type="text" name="tempo_dedicado"></div>
        <div><label>Data Limite *</label><input type="datetime-local" name="data_hora_limite" required></div>
      </div>
      <button type="submit" id="btnEnviar">Enviar Pedido</button>
    </form>
    <div class="success" id="successMessage">✅ Pedido enviado com sucesso!</div>
  </div>

  <script>
    const supabaseClient = supabase.createClient('https://dunondjiqawovisnwavg.supabase.co', 'sb_publishable_WekrBSs5JOjnJ1SGxFvmKQ_3v6AnBMs');

    window.onload = async () => {
      const { data } = await supabaseClient.auth.getSession();
      if (!data.session) window.location.href = 'index.html';
      else document.getElementById('user-display').innerText = data.session.user.email;
    };

    const form = document.getElementById("formulario");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btnEnviar");
      btn.disabled = true; btn.innerText = "A gravar...";

      const formData = new FormData(form);
      const dataObj = Object.fromEntries(formData.entries());

      // 1. Enviar para Supabase
      const { error } = await supabaseClient.from('pedidos').insert([dataObj]);
      if (error) { alert("Erro DB: " + error.message); btn.disabled = false; return; }

      // 2. Enviar para Web3Forms
      const response = await fetch("https://api.web3forms.com/submit", { method: "POST", body: formData });
      if (response.ok) {
        document.getElementById("successMessage").style.display = "block";
        form.reset();
      }
      btn.disabled = false; btn.innerText = "Enviar Pedido";
    });
  </script>
</body>
</html>
