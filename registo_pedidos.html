<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registo de Pedidos</title>

<link rel="icon" type="image/jpeg" href="favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; font-family: Arial, sans-serif; color: white; padding: 30px; }
    .container { max-width: 900px; margin: auto; background: #1e293b; padding: 35px; border-radius: 18px; box-shadow: 0 0 30px rgba(0,0,0,0.4); }
    
    .header-area { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 15px; }
    h1 { font-size: 34px; }
    .btn-voltar { background: #334155; color: white; text-decoration: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: bold; transition: 0.2s; white-space: nowrap; }
    .btn-voltar:hover { background: #475569; }

    .subtitle { color: #94a3b8; margin-bottom: 30px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .full { grid-column: 1 / -1; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }
    input, textarea, select { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #334155; color: white; font-size: 15px; }
    input:focus, textarea:focus, select:focus { outline: 2px solid #3b82f6; }
    textarea { min-height: 120px; resize: vertical; }
    button { width: 100%; margin-top: 25px; padding: 16px; border: none; border-radius: 10px; background: #2563eb; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #64748b; cursor: not-allowed; opacity: 0.6; }
    .success { display: none; margin-top: 20px; background: #065f46; padding: 15px; border-radius: 10px; text-align: center; }
    
    @media(max-width:700px) { 
      .grid { grid-template-columns: 1fr; } 
      .header-area { flex-direction: column; align-items: flex-start; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <div class="container">
    <div class="header-area">
      <h1>Registo de Pedidos</h1>
      <a href="index.html" class="btn-voltar">⬅ Voltar ao Menu</a>
    </div>

    <form id="formulario" action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="9f471d61-2558-4df2-a220-0028f59bd975">
      <input type="hidden" name="subject" value="Novo Pedido - Sistema Interno">
      <input type="hidden" name="from_name" value="Sistema de Pedidos">
      <input type="checkbox" name="botcheck" style="display:none;">
      
      <input type="hidden" name="00_LINHA_EXCEL" id="excelLinha">
      <input type="hidden" name="01_Data_do_Pedido" id="hiddenData">
      <input type="hidden" name="02_Hora_do_Pedido" id="hiddenHora">
      
      <div class="grid">
        <div>
          <label>Técnico *</label>
          <input type="text" name="03_Nome" required>
        </div>

        <div>
          <label>Data + Hora do Pedido *</label>
          <input type="datetime-local" id="dataHoraInput" required>
        </div>

        <div>
          <label>Requerente *</label>
          <input type="text" name="04_Requerente" required>
        </div>
        
        <div>
          <label>Empresa *</label>
          <select id="empresaSelect" name="05_Empresa" required>
            <option value="">Selecionar Empresa</option>
            <option value="CCR ENG&CONST">CCR ENG&CONST</option>
            <option value="CCR-INVEST">CCR-INVEST</option>
            <option value="GROWNOR">GROWNOR</option>
            <option value="WEST-VIEW">WEST-VIEW</option>
            <option value="GRAU-ON">GRAU-ON</option>
            <option value="FERCAYO">FERCAYO</option>
            <option value="DECIBOLT">DECIBOLT</option>
            <option value="INTERNO">INTERNO</option>
            <option value="EXTERNO">EXTERNO</option>
          </select>
        </div>
      </div>

      <input type="hidden" name="06_Via" id="hiddenVia">

      <div class="grid">
        <div>
          <label>Via de Comunicação *</label>
          <select id="viaSelect" required>
            <option value="">Selecionar Via</option>
            <option value="Chamada">Chamada</option>
            <option value="SMS">SMS</option>
            <option value="Email">Email</option>
            <option value="Presencial">Presencial</option>
            <option value="Whatsapp">Whatsapp</option>
            <option value="Outro">Outro</option>
          </select>
        </div>
        <div id="outrosDiv" style="display:none;">
          <label>Especificar Via Outro *</label>
          <input type="text" id="viaOutrosInput">
        </div>

        <div>
          <label>Local / Obra *</label>
          <input type="text" name="07_Local_Obra" required>
        </div>
      </div>

      <input type="hidden" name="08_Concelho" id="hiddenConcelho">

      <div class="grid">
        <div>
          <label>Concelho *</label>
          <select id="concelhoSelect" required>
            <option value="">Selecionar Concelho</option>
            <option value="Póvoa de Varzim">Póvoa de Varzim</option>
            <option value="Guimarães">Guimarães</option>
            <option value="Vila do Conde">Vila do Conde</option>
            <option value="Famalicão">Famalicão</option>
            <option value="Maia">Maia</option>
            <option value="Porto">Porto</option>
            <option value="Outro">Outro</option>
          </select>
        </div>
        <div id="concelhoOutroDiv" style="display:none;">
          <label>Especificar Concelho Outro *</label>
          <input type="text" id="concelhoOutroInput">
        </div>

        <div class="full">
          <label>Serviço solicitado *</label>
          <textarea name="09_Servico" required></textarea>
        </div>

        <div class="full">
          <label>Observação</label>
          <textarea name="10_Observação"></textarea>
        </div>

        <div>
          <label>Tipo de Trabalho *</label>
          <select id="tipoTrabalhoSelect" name="11_Tipo_Trabalho" required>
            <option value="">Selecionar Tipo</option>
            <option value="Lev. Topográfico">Lev. Topográfico</option>
            <option value="Monitorização">Monitorização</option>
            <option value="Implantação">Implantação</option>
            <option value="Gabinete / Estudos">Gabinete / Estudos</option>
          </select>
        </div>
        
        <div>
          <label>Frequência *</label>
          <select id="frequenciaSelect" name="12_Frequencia" required>
            <option value="">Selecionar Frequência</option>
            <option value="Diária">Diária</option>
            <option value="Semanal">Semanal</option>
            <option value="Mensal">Mensal</option>
            <option value="Trimestral">Trimestral</option>
            <option value="Semestral">Semestral</option>
            <option value="Anual">Anual</option>
            <option value="Continua">Continua</option>
          </select>
        </div>

        <div class="full">
          <label>Tempo Dedicado ao Trabalho (S/Deslocação)</label>
          <input type="text" name="13_Tempo_Dedicado" id="tempoDedicadoInput" placeholder="Ex: 2h, 1 dia inteiro">
        </div>

        <div>
          <label>Data Limite de Resposta *</label>
          <input type="datetime-local" id="dataHoraLimInput" required>
        </div>
      </div>

      <input type="hidden" name="14_Data_Limite" id="hiddenDataLim">
      <input type="hidden" name="15_Hora_Limite" id="hiddenHoraLim">

      <button type="submit" id="btnEnviar">Enviar Pedido</button>
    </form>

    <div class="success" id="successMessage">
      ✅ Pedido enviado e guardado com sucesso!
    </div>
  </div>

  <script>
    // Inicializar ligação ao teu projeto Supabase
    const _supabase = supabase.createClient('https://dunondjiqawovisnwavg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1bm9uZGppcWF3b3Zpc253YXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTk3MjIsImV4cCI6MjA5NTYzNTcyMn0.KY5xnuHCixsO0a4yCzXP6CmO8e08v1wrDjoGCL-LTro');

    function atualizarDataAtual() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById("dataHoraInput").value = now.toISOString().slice(0, 16);
    }
    atualizarDataAtual();

    const viaSelect = document.getElementById("viaSelect");
    const outrosDiv = document.getElementById("outrosDiv");
    const viaOutrosInput = document.getElementById("viaOutrosInput");

    viaSelect.addEventListener("change", () => {
      if (viaSelect.value === "Outro") {
        outrosDiv.style.display = "block";
        viaOutrosInput.required = true;
      } else {
        outrosDiv.style.display = "none";
        viaOutrosInput.required = false;
        viaOutrosInput.value = "";
      }
    });

    const concelhoSelect = document.getElementById("concelhoSelect");
    const concelhoOutroDiv = document.getElementById("concelhoOutroDiv");
    const concelhoOutroInput = document.getElementById("concelhoOutroInput");

    concelhoSelect.addEventListener("change", () => {
      if (concelhoSelect.value === "Outro") {
        concelhoOutroDiv.style.display = "block";
        concelhoOutroInput.required = true;
      } else {
        concelhoOutroDiv.style.display = "none";
        concelhoOutroInput.required = false;
        concelhoOutroInput.value = "";
      }
    });

    const form = document.getElementById("formulario");
    const btnEnviar = document.getElementById("btnEnviar");
    const successMsg = document.getElementById("successMessage");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const separar = (id) => {
        const val = document.getElementById(id).value;
        return val ? val.split("T") : ["-", "-"];
      };

      const formatarDataPT = (dataISO) => {
        if (!dataISO || dataISO === "-") return "-";
        const partes = dataISO.split("-");
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
      };

      const rawDataHoraInput = document.getElementById("dataHoraInput").value;
      const rawDataHoraLimInput = document.getElementById("dataHoraLimInput").value;

      const [dPedRaw, hPed] = separar("dataHoraInput");
      const [dLimRaw, hLim] = separar("dataHoraLimInput");

      const dPed = formatarDataPT(dPedRaw);
      const dLim = formatarDataPT(dLimRaw);

      const viaFinal = viaSelect.value === "Outro" ? (viaOutrosInput.value || "-") : (viaSelect.value || "-");
      const concelhoFinal = concelhoSelect.value === "Outro" ? (concelhoOutroInput.value || "-") : (concelhoSelect.value || "-");
      
      const empresaFinal = document.getElementById("empresaSelect").value || "-";
      const tipoTrabalho = document.getElementById("tipoTrabalhoSelect").value || "-";
      const frequencia = document.getElementById("frequenciaSelect").value || "-";
      const tempoDedicado = document.getElementById("tempoDedicadoInput").value || "-";

      document.getElementById("hiddenData").value = dPed;
      document.getElementById("hiddenHora").value = hPed;
      document.getElementById("hiddenVia").value = viaFinal;
      document.getElementById("hiddenConcelho").value = concelhoFinal;
      document.getElementById("hiddenDataLim").value = dLim;
      document.getElementById("hiddenHoraLim").value = hLim;

      const n = form.elements["03_Nome"].value || "-";
      const r = form.elements["04_Requerente"].value || "-";
      const l = form.elements["07_Local_Obra"].value || "-";
      const s = (form.elements["09_Servico"].value || "-").replace(/;/g, ",").replace(/\n/g, " ");
      const o = (form.elements["10_Observação"].value || "-").replace(/;/g, ",").replace(/\n/g, " ");

      const sep = ";";
      const linhaExcel = n + sep + dPed + sep + hPed + sep + r + sep + empresaFinal + sep + viaFinal + sep + l + sep + concelhoFinal + sep + s + sep + o + sep + tipoTrabalho + sep + frequencia + sep + tempoDedicado + sep + dLim + sep + hLim;
      
      document.getElementById("excelLinha").value = linhaExcel;

      btnEnviar.disabled = true;
      btnEnviar.innerText = "A enviar...";

      try {
        // Envio 1: Gravar na base de dados Supabase
        await _supabase.from('pedidos').insert([{
          tecnico: n,
          data_hora_pedido: rawDataHoraInput,
          requerente: r,
          empresa: empresaFinal,
          via: viaFinal,
          local_obra: l,
          concelho: concelhoFinal,
          servico: s,
          observacao: o,
          tipo_trabalho: tipoTrabalho,
          frequencia: frequencia,
          tempo_dedicado: tempoDedicado,
          data_hora_limite: rawDataHoraLimInput
        }]);

        // Envio 2: Enviar email com Web3Forms
        const response = await fetch("https://api.web3forms.com/submit", {
          method: "POST",
          body: new FormData(form) 
        });

        const result = await response.json();
        if (result.success) {
          successMsg.style.display = "block";
          form.reset();
          atualizarDataAtual();
          outrosDiv.style.display = "none";
          concelhoOutroDiv.style.display = "none";
          viaOutrosInput.required = false;
          concelhoOutroInput.required = false;
          window.scrollTo({ top: 0, behavior: 'smooth' });
          setTimeout(() => { successMsg.style.display = "none"; }, 5000);
        } else {
          alert("Erro ao enviar o formulário por email, mas os dados foram salvos.");
        }
      } catch (err) {
        alert("Erro de ligação.");
        console.error(err);
      } finally {
        btnEnviar.disabled = false;
        btnEnviar.innerText = "Enviar Pedido";
      }
    });
  </script>

</body>
</html>
