<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registar Pedido</title>
  <link rel="icon" type="image/jpeg" href="favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; font-family: Arial, sans-serif; color: white; padding: 30px; display: none; } /* Oculto até validar */
    .container { max-width: 700px; margin: auto; background: #1e293b; padding: 35px; border-radius: 18px; box-shadow: 0 0 30px rgba(0,0,0,0.4); }
    .header-area { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
    h1 { font-size: 28px; }
    .btn-voltar { background: #334155; color: white; text-decoration: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: bold; transition: 0.2s; }
    .btn-voltar:hover { background: #475569; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }
    input, textarea, select { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #334155; color: white; font-size: 15px; }
    textarea { min-height: 100px; resize: vertical; }
    .btn-submeter { width: 100%; background: #2563eb; color: white; border: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
    .btn-submeter:hover { background: #1d4ed8; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-area">
      <h1>Registar Novo Pedido</h1>
      <a href="index.html" class="btn-voltar">⬅ Voltar</a>
    </div>

    <form id="formPedido">
      <div class="form-group">
        <label>Técnico Responsável</label>
        <input type="text" id="tecnico" required placeholder="Nome do técnico">
      </div>
      <div class="form-group">
        <label>Data e Hora do Pedido</label>
        <input type="datetime-local" id="data_hora_pedido" required>
      </div>
      <div class="form-group">
        <label>Requerente</label>
        <input type="text" id="requerente" required placeholder="Quem solicitou">
      </div>
      <div class="form-group">
        <label>Empresa</label>
        <input type="text" id="empresa" required placeholder="Nome da empresa">
      </div>
      <div class="form-group">
        <label>Via de Comunicação</label>
        <input type="text" id="via" required placeholder="Ex: Telemóvel, Email, Presencial">
      </div>
      <div class="form-group">
        <label>Local / Obra</label>
        <input type="text" id="local_obra" required placeholder="Destino ou identificação da obra">
      </div>
      <div class="form-group">
        <label>Serviço Solicitado</label>
        <textarea id="servico" required placeholder="Descrição detalhada do serviço..."></textarea>
      </div>
      <div class="form-group">
        <label>Observações</label>
        <textarea id="observacao" placeholder="Notas adicionais (opcional)..."></textarea>
      </div>
      <div class="form-group">
        <label>Tipo de Trabalho</label>
        <input type="text" id="tipo_trabalho" required placeholder="Ex: Reparação, Instalação">
      </div>
      <div class="form-group">
        <label>Frequência / Detalhes</label>
        <input type="text" id="frequencia" placeholder="Ex: Urgente, Preventiva">
      </div>

      <button type="submit" class="btn-submeter">Submeter Pedido</button>
    </form>
  </div>

  <script>
    const SB_URL = 'https://dunondjiqawovisnwavg.supabase.co/rest/v1/pedidos';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1bm9uZGppcWF3b3Zpc253YXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTk3MjIsImV4cCI6MjA5NTYzNTcyMn0.KY5xnuHCixsO0a4yCzXP6CmO8e08v1wrDjoGCL-LTro';
    
    let tokenAdmin = sessionStorage.getItem("admin_code");

    document.addEventListener("DOMContentLoaded", function() {
      if (!tokenAdmin) {
        alert("Acesso negado. Por favor insira o código no menu inicial.");
        window.location.href = "index.html";
        return;
      }
      document.body.style.display = "block";
      
      // Coloca a data/hora atual por padrão
      const agora = new Date();
      agora.setMinutes(agora.getMinutes() - agora.getTimezoneOffset());
      document.getElementById('data_hora_pedido').value = agora.toISOString().slice(0, 16);
    });

    document.getElementById("formPedido").addEventListener("submit", async function(e) {
      e.preventDefault();
      
      const payload = {
        tecnico: document.getElementById("tecnico").value,
        data_hora_pedido: document.getElementById("data_hora_pedido").value,
        requerente: document.getElementById("requerente").value,
        empresa: document.getElementById("empresa").value,
        via: document.getElementById("via").value,
        local_obra: document.getElementById("local_obra").value,
        servico: document.getElementById("servico").value,
        observacao: document.getElementById("observacao").value,
        tipo_trabalho: document.getElementById("tipo_trabalho").value,
        frequencia: document.getElementById("frequencia").value
      };

      try {
        const response = await fetch(SB_URL, {
          method: 'POST',
          headers: {
            'apikey': SB_KEY,
            'Authorization': `Bearer ${SB_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal',
            'x-admin-code': tokenAdmin
          },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          alert("Pedido registado com sucesso!");
          document.getElementById("formPedido").reset();
          window.location.href = "index.html";
        } else {
          alert("Erro ao registar o pedido. Sem permissões de acesso.");
        }
      } catch (err) {
        console.error(err);
        alert("Erro na ligação ao servidor.");
      }
    });
  </script>
</body>
</html>
