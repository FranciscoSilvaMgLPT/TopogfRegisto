<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registo de Pedidos</title>
  <link rel="icon" type="image/jpeg" href="favicon.png">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* Ocultar corpo inicialmente para evitar "flash" de conteúdo antes da verificação */
    body { display: none; background: #0f172a; font-family: Arial, sans-serif; color: white; padding: 30px; }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .container { max-width: 900px; margin: auto; background: #1e293b; padding: 35px; border-radius: 18px; box-shadow: 0 0 30px rgba(0,0,0,0.4); }
    .header-area { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 15px; }
    h1 { font-size: 34px; }
    .btn-voltar { background: #334155; color: white; text-decoration: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: bold; transition: 0.2s; white-space: nowrap; }
    .btn-voltar:hover { background: #475569; }
    .subtitle { color: #94a3b8; margin-bottom: 30px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .full { grid-column: 1 / -1; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }
    input, textarea, select { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #334155; color: white; font-size: 15px; }
    input:focus, textarea:focus, select:focus { outline: 2px solid #3b82f6; }
    textarea { min-height: 120px; resize: vertical; }
    button { width: 100%; margin-top: 25px; padding: 16px; border: none; border-radius: 10px; background: #2563eb; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #64748b; cursor: not-allowed; opacity: 0.6; }
    .success { display: none; margin-top: 20px; background: #065f46; padding: 15px; border-radius: 10px; text-align: center; }
    @media(max-width:700px) { .grid { grid-template-columns: 1fr; } .header-area { flex-direction: column; align-items: flex-start; } }
  </style>

  <script>
    // CONFIGURAÇÃO
    const SUPABASE_URL = 'https://dunondjiqawovisnwavg.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_WekrBSs5JOjnJ1SGxFvmKQ_3v6AnBMs';
    window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Proteção da página
    (async () => {
      const { data } = await window.supabaseClient.auth.getSession();
      if (!data.session) {
        window.location.href = 'index.html'; // Redireciona se não logado
      } else {
        document.body.style.display = 'block'; // Mostra a página se ok
      }
    })();
  </script>
</head>

<body>
  <div class="container">
    <div class="header-area">
      <h1>Registo de Pedidos</h1>
      <a href="index.html" class="btn-voltar">⬅ Voltar ao Menu</a>
    </div>

    <form id="formulario" action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="9f471d61-2558-4df2-a220-0028f59bd975">
      <button type="submit" id="btnEnviar">Enviar Pedido</button>
    </form>
    
    <div class="success" id="successMessage">✅ Pedido enviado!</div>
  </div>

  <script>
    // Manter aqui todo o teu JavaScript original a partir da linha de "atualizarDataAtual()..."

  </script>
</body>
</html>
