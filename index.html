<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Controlo</title>

  <link rel="icon" type="image/jpeg" href="favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* Body escondido até validarmos a password */
    body { background: #0f172a; font-family: Arial, sans-serif; color: white; min-height: 100vh; display: none; align-items: center; justify-content: center; padding: 30px; }
    
    .menu-container { max-width: 900px; width: 100%; background: #1e293b; padding: 45px; border-radius: 18px; box-shadow: 0 0 30px rgba(0,0,0,0.4); text-align: center; }
    
    .menu-logo { width: 80px; height: auto; margin-bottom: 20px; }
    
    h1 { font-size: 36px; margin-bottom: 40px; color: #ffffff; }
    
    .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
    
    .menu-card { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #334155; padding: 30px; border-radius: 14px; text-decoration: none; color: white; transition: all 0.3s ease; border: 2px solid transparent; }
    .menu-card:hover { transform: translateY(-5px); background: #475569; border-color: #3b82f6; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    
    .card-registar { border-left: 4px solid #3b82f6; }
    .card-visualizar { border-left: 4px solid #10b981; }
    
    .icon { font-size: 36px; margin-bottom: 15px; }
    .card-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
    
    @media(max-width:700px) { 
      .grid-menu { grid-template-columns: 1fr; } 
      .menu-container { padding: 30px 20px; }
      .menu-logo { width: 70px; }
    }
  </style>
</head>

<body>

  <div class="menu-container">
    <img src="favicon.png" alt="Logo" class="menu-logo">
    <h1>Painel de Controlo</h1>

    <div class="grid-menu">
      <a href="registo_pedidos.html" class="menu-card card-registar">
        <div class="icon">📝</div>
        <div class="card-title">Registar Pedido</div>
      </a>
      <a href="ver_pedidos.html" class="menu-card card-visualizar">
        <div class="icon">📋</div>
        <div class="card-title">Gerir Pedidos</div>
      </a>
      <a href="atividade.html" class="menu-card card-registar">
        <div class="icon">📊</div>
        <div class="card-title">Registar Atividade</div>
      </a>
      <a href="ver_atividade.html" class="menu-card card-visualizar">
        <div class="icon">🔍</div>
        <div class="card-title">Ver Histórico de Atividades</div>
      </a>
    </div>
  </div>

  <script>
    async function validarAcesso() {
      // URL para verificar permissão na tabela atividades
      const SB_URL = 'https://dunondjiqawovisnwavg.supabase.co/rest/v1/atividades?limit=1';
      const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1bm9uZGppcWF3b3Zpc253YXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTk3MjIsImV4cCI6MjA5NTYzNTcyMn0.KY5xnuHCixsO0a4yCzXP6CmO8e08v1wrDjoGCL-LTro';

      // Tenta recuperar a password da sessão
      let password = sessionStorage.getItem("admin_code");

      // Se não tiver password guardada, pede
      if (!password) {
        password = prompt("Introduza a Chave de Acesso Técnico:");
      }

      // Se o utilizador cancelou o prompt
      if (!password) {
        alert("Acesso negado.");
        window.location.reload();
        return;
      }

      try {
        const response = await fetch(SB_URL, {
          method: 'GET',
          headers: {
            'apikey': SB_KEY,
            'Authorization': `Bearer ${SB_KEY}`,
            'x-admin-code': password
          }
        });

        // Verificação: Se a password for errada, o Supabase bloqueia (403 ou 401)
        if (response.status === 403 || response.status === 401) {
          throw new Error("Credenciais inválidas");
        }

        // Se chegou aqui, o acesso é legítimo
        sessionStorage.setItem("admin_code", password);
        document.body.style.display = "flex"; // Mostra o menu

      } catch (e) {
        console.error("Erro de autenticação:", e);
        alert("Chave de acesso incorreta ou erro de servidor.");
        sessionStorage.removeItem("admin_code"); // Remove a chave errada
        window.location.reload(); // Recarrega para pedir de novo
      }
    }

    // Executa a validação
    validarAcesso();
  </script>
</body>
</html>
