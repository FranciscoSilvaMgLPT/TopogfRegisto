<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Principal - Sistema Interno</title>

  <link rel="icon" type="image/jpeg" href="favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* O body começa escondido (display: none) para ninguém ver o menu antes de fazer login */
    body { background: #0f172a; font-family: Arial, sans-serif; color: white; min-height: 100vh; display: none; align-items: center; justify-content: center; padding: 30px; }
    
    .menu-container { max-width: 900px; width: 100%; background: #1e293b; padding: 45px; border-radius: 18px; box-shadow: 0 0 30px rgba(0,0,0,0.4); text-align: center; }
    
    .menu-logo { width: 80px; height: auto; margin-bottom: 20px; }
    
    h1 { font-size: 36px; margin-bottom: 40px; color: #ffffff; }
    
    /* Grid ajustada para 2 colunas */
    .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
    
    .menu-card { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #334155; padding: 30px; border-radius: 14px; text-decoration: none; color: white; transition: all 0.3s ease; border: 2px solid transparent; }
    .menu-card:hover { transform: translateY(-5px); background: #475569; border-color: #3b82f6; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    
    /* Cores subtis para diferenciar Registar de Visualizar */
    .card-registar { border-left: 4px solid #3b82f6; }
    .card-visualizar { border-left: 4px solid #10b981; }
    
    .icon { font-size: 36px; margin-bottom: 15px; }
    .card-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
    .card-desc { font-size: 13px; color: #cbd5e1; text-align: center; }
    
    @media(max-width:700px) { 
      .grid-menu { grid-template-columns: 1fr; } 
      .menu-container { padding: 30px 20px; }
      .menu-logo { width: 70px; }
    }
  </style>
</head>

<body>

  <div class="menu-container">
    <img src="favicon.png" alt="Logo" class="menu-logo">
    
    <h1>Painel de Controlo</h1>

    <div class="grid-menu">
      <a href="registo_pedidos.html" class="menu-card card-registar">
        <div class="icon">📝</div>
        <div class="card-title">Registar Pedido</div>
      </a>

      <a href="ver_pedidos.html" class="menu-card card-visualizar">
        <div class="icon">📋</div>
        <div class="card-title">Ver/Gerir Pedidos</div>
      </a>

      <a href="atividade.html" class="menu-card card-registar">
        <div class="icon">📊</div>
        <div class="card-title">Registar Atividade</div>
      </a>

      <a href="ver_atividade.html" class="menu-card card-visualizar">
        <div class="icon">🔍</div>
        <div class="card-title">Ver/Gerir Atividades</div>
      </a>
    </div>
  </div>

  <script>
    const SB_URL_VALIDAR = 'https://dunondjiqawovisnwavg.supabase.co/rest/v1/atividades?limit=1';
    const SB_KEY_VALIDAR = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1bm9uZGppcWF3b3Zpc253YXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTk3MjIsImV4cCI6MjA5NTYzNTcyMn0.KY5xnuHCixsO0a4yCzXP6CmO8e08v1wrDjoGCL-LTro';

    async function verificarAcessoReal() {
      let tokenAdmin = sessionStorage.getItem("admin_code");

      // Se não houver token guardado, fazemos o processo de login
      if (!tokenAdmin) {
        tokenAdmin = prompt("Introduza o Código de Acesso Técnico:");
        
        if (!tokenAdmin || tokenAdmin.trim() === "") {
          alert("Acesso recusado. Código obrigatório.");
          window.location.reload();
          return;
        }

        // Faz um pequeno teste de leitura no Supabase injetando o código digitado
        try {
          const response = await fetch(SB_URL_VALIDAR, {
            method: 'GET',
            headers: {
              'apikey': SB_KEY_VALIDAR,
              'Authorization': `Bearer ${SB_KEY_VALIDAR}`,
              'x-admin-code': tokenAdmin // Enviamos o código para o Supabase validar nas RLS
            }
          });

          // Se o Supabase rejeitar (status 401 ou 403), significa que o código está errado
          if (!response.ok) {
            alert("Código de acesso incorreto ou inválido.");
            window.location.reload();
            return;
          }

          // Se a resposta for positiva, guardamos o código na sessão
          sessionStorage.setItem("admin_code", tokenAdmin);

        } catch (err) {
          alert("Erro ao conectar ao servidor de autenticação.");
          window.location.reload();
          return;
        }
      }
      
      // Password validada com sucesso pelo Supabase! Mostramos o ecrã com o teu estilo flex
      document.body.style.display = "flex";
    }

    // Dispara a validação imediatamente
    verificarAcessoReal();
  </script>

</body>
</html>
