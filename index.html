<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Painel de Controlo - Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    body { background: #0f172a; font-family: Arial, sans-serif; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
    #login-box { background: #1e293b; padding: 40px; border-radius: 18px; text-align: center; width: 300px; }
    input { padding: 12px; margin: 10px 0; border-radius: 5px; border: none; width: 100%; box-sizing: border-box; }
    button { padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; }
    #main-content { display: none; }
    .menu-container { max-width: 800px; width: 100%; background: #1e293b; padding: 45px; border-radius: 18px; box-shadow: 0 0 30px rgba(0,0,0,0.4); text-align: center; }
    .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 20px; }
    .menu-card { background: #334155; padding: 35px; border-radius: 14px; text-decoration: none; color: white; display: flex; flex-direction: column; align-items: center; }
  </style>
</head>
<body>

  <div id="login-box">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="fazerLogin()">Entrar</button>
  </div>

  <div id="main-content" class="menu-container">
    <h1>Painel de Controlo</h1>
    <div class="grid-menu">
      <a href="registo_pedidos.html" class="menu-card"><div>📝 Registo de Pedidos</div></a>
      <a href="atividade.html" class="menu-card"><div>📊 Atividade</div></a>
    </div>
    <button onclick="fazerLogout()" style="margin-top:20px; background:#ef4444; width: auto;">Sair</button>
  </div>

  <script>
    // Configuração do cliente Supabase
    const SUPABASE_URL = 'https://dunondjiqawovisnwavg.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_WekrBSs5JOjnJ1SGxFvmKQ_3v6AnBMs';

    // Usamos 'window.supabaseClient' para evitar conflitos globais
    window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    window.onload = async () => {
      const { data } = await window.supabaseClient.auth.getSession();
      if (data.session) {
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
      }
    };

    async function fazerLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const { error } = await window.supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        alert("Erro: " + error.message);
      } else {
        location.reload();
      }
    }

    async function fazerLogout() {
      await window.supabaseClient.auth.signOut();
      location.reload();
    }
  </script>
</body>
</html>
