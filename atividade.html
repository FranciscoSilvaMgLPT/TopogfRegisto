<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registo de Atividade</title>

  <link rel="icon" type="image/jpeg" href="favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; font-family: Arial, sans-serif; color: white; padding: 30px; }
    .container { max-width: 900px; margin: auto; background: #1e293b; padding: 35px; border-radius: 18px; box-shadow: 0 0 30px rgba(0,0,0,0.4); }
    
    .header-area { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    h1 { font-size: 34px; }
    .btn-voltar { background: #334155; color: white; text-decoration: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: bold; transition: 0.2s; }
    .btn-voltar:hover { background: #475569; }
    
    .subtitle { color: #94a3b8; margin-bottom: 30px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .full { grid-column: 1 / -1; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }
    input, textarea, select { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #334155; color: white; font-size: 15px; }
    input:focus, textarea:focus, select:focus { outline: 2px solid #3b82f6; }
    textarea { min-height: 120px; resize: vertical; }
    
    button { width: 100%; margin-top: 25px; padding: 16px; border: none; border-radius: 10px; background: #2563eb; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #64748b; cursor: not-allowed; opacity: 0.6; }
    
    .success { display: none; margin-top: 20px; background: #065f46; padding: 15px; border-radius: 10px; text-align: center; }
    @media(max-width:700px) { 
      .grid { grid-template-columns: 1fr; } 
      .header-area { flex-direction: column; align-items: flex-start; gap: 15px; }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="header-area">
      <h1>Registo de Atividade</h1>
      <a href="index.html" class="btn-voltar">⬅ Voltar ao Menu</a>
    </div>
    <p class="subtitle">Introduza os dados relativos à atividade realizada</p>

    <form id="formularioAtividade" action="https://api.web3forms.com/submit" method="POST">
      <input type="hidden" name="access_key" value="9f471d61-2558-4df2-a220-0028f59bd975">
      <input type="hidden" name="subject" value="Nova Atividade Registada - Sistema Interno">
      <input type="hidden" name="from_name" value="Sistema de Atividades">
      <input type="checkbox" name="botcheck" style="display:none;">

      <div class="grid">
        <div class="full">
          <label>Nome do Técnico *</label>
          <input type="text" name="Tecnico_Nome" id="txtTecnico" required placeholder="Nome do técnico responsável">
        </div>

        <div>
          <label>Data / Hora de Início *</label>
          <input type="datetime-local" id="dataHoraInicio" name="Atividade_Inicio" required>
        </div>

        <div>
          <label>Data / Hora de Fim *</label>
          <input type="datetime-local" id="dataHoraFim" name="Atividade_Fim" required>
        </div>

        <div class="full">
          <label>Local / Obra *</label>
          <input type="text" name="Atividade_Local_Obra" id="txtLocal" required placeholder="Identificação do local ou obra">
        </div>

        <div class="full">
          <label>Serviço solicitado / realizado *</label>
          <textarea name="Atividade_Servico" id="txtServico" required placeholder="Descrição detalhada do serviço..."></textarea>
        </div>
      </div>

      <button type="submit" id="btnEnviar">Gravar Atividade</button>
    </form>

    <div class="success" id="successMessage">
      ✅ Atividade registada com sucesso!
    </div>
  </div>

  <script>
    const SB_URL = 'https://dunondjiqawovisnwavg.supabase.co/rest/v1/atividades';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1bm9uZGppcWF3b3Zpc253YXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTk3MjIsImV4cCI6MjA5NTYzNTcyMn0.KY5xnuHCixsO0a4yCzXP6CmO8e08v1wrDjoGCL-LTro';

    function definirDataAtual() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById("dataHoraInicio").value = now.toISOString().slice(0, 16);
    }
    definirDataAtual();

    const form = document.getElementById("formularioAtividade");
    const btnEnviar = document.getElementById("btnEnviar");
    const successMsg = document.getElementById("successMessage");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const rawInicio = document.getElementById("dataHoraInicio").value;
      const rawFim = document.getElementById("dataHoraFim").value;

      if (new Date(rawFim) < new Date(rawInicio)) {
        alert("A data/hora de fim não pode ser anterior à data/hora de início.");
        return;
      }

      const tecnico = document.getElementById("txtTecnico").value;
      const localObra = document.getElementById("txtLocal").value;
      const servico = document.getElementById("txtServico").value;

      btnEnviar.disabled = true;
      btnEnviar.innerText = "A gravar...";

      try {
        // Envio Direto via HTTP REST (Evita falhas do Script do Supabase)
        const sbResponse = await fetch(SB_URL, {
          method: 'POST',
          headers: {
            'apikey': SB_KEY,
            'Authorization': `Bearer ${SB_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({
            tecnico: tecnico,
            data_hora_inicio: rawInicio,
            data_hora_fim: rawFim,
            local_obra: localObra,
            servico: servico
          })
        });

        if (!sbResponse.ok) {
          throw new Error(`Erro Supabase: ${sbResponse.status}`);
        }

        // Envio para Email (Web3Forms)
        const response = await fetch("https://api.web3forms.com/submit", {
          method: "POST",
          body: new FormData(form)
        });

        const result = await response.json();
        if (result.success) {
          successMsg.style.display = "block";
          form.reset();
          definirDataAtual();
          window.scrollTo({ top: 0, behavior: 'smooth' });
          setTimeout(() => { successMsg.style.display = "none"; }, 5000);
        } else {
          alert("Erro ao enviar o email, mas os dados foram salvos no banco de dados.");
        }
      } catch (err) {
        alert("Falha na gravação dos dados. Por favor, verifica a ligação.");
        console.error(err);
      } finally {
        btnEnviar.disabled = false;
        btnEnviar.innerText = "Gravar Atividade";
      }
    });
  </script>

</body>
</html>
