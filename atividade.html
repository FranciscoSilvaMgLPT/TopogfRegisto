<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registar Atividade</title>
  <link rel="icon" type="image/jpeg" href="favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; font-family: Arial, sans-serif; color: white; padding: 30px; display: none; }
    .container { max-width: 700px; margin: auto; background: #1e293b; padding: 35px; border-radius: 18px; box-shadow: 0 0 30px rgba(0,0,0,0.4); }
    .header-area { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
    h1 { font-size: 28px; }
    .btn-voltar { background: #334155; color: white; text-decoration: none; padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: bold; transition: 0.2s; }
    .btn-voltar:hover { background: #475569; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }
    input, textarea { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #334155; color: white; font-size: 15px; }
    textarea { min-height: 120px; resize: vertical; }
    .btn-submeter { width: 100%; background: #2563eb; color: white; border: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
    .btn-submeter:hover { background: #1d4ed8; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-area">
      <h1>Registar Nova Atividade</h1>
      <a href="index.html" class="btn-voltar">⬅ Voltar</a>
    </div>

    <form id="formAtividade">
      <div class="form-group">
        <label>Técnico</label>
        <input type="text" id="tecnico" required placeholder="O teu nome">
      </div>
      <div class="form-group">
        <label>Data/Hora de Início</label>
        <input type="datetime-local" id="data_hora_inicio" required>
      </div>
      <div class="form-group">
        <label>Data/Hora de Fim</label>
        <input type="datetime-local" id="data_hora_fim" required>
      </div>
      <div class="form-group">
        <label>Local / Obra</label>
        <input type="text" id="local_obra" required placeholder="Identificação do local">
      </div>
      <div class="form-group">
        <label>Serviço Realizado</label>
        <textarea id="servico" required placeholder="Descreve o trabalho executado..."></textarea>
      </div>

      <button type="submit" class="btn-submeter">Gravar Atividade</button>
    </form>
  </div>

  <script>
    const SB_URL = 'https://dunondjiqawovisnwavg.supabase.co/rest/v1/atividades';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1bm9uZGppcWF3b3Zpc253YXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTk3MjIsImV4cCI6MjA5NTYzNTcyMn0.KY5xnuHCixsO0a4yCzXP6CmO8e08v1wrDjoGCL-LTro';
    
    let tokenAdmin = sessionStorage.getItem("admin_code");

    document.addEventListener("DOMContentLoaded", function() {
      if (!tokenAdmin) {
        alert("Acesso negado. Por favor insira o código no menu inicial.");
        window.location.href = "index.html";
        return;
      }
      document.body.style.display = "block";
      
      // Define a data atual nos campos
      const agora = new Date();
      agora.setMinutes(agora.getMinutes() - agora.getTimezoneOffset());
      const dataFormatada = agora.toISOString().slice(0, 16);
      document.getElementById('data_hora_inicio').value = dataFormatada;
      document.getElementById('data_hora_fim').value = dataFormatada;
    });

    document.getElementById("formAtividade").addEventListener("submit", async function(e) {
      e.preventDefault();
      
      const payload = {
        tecnico: document.getElementById("tecnico").value,
        data_hora_inicio: document.getElementById("data_hora_inicio").value,
        data_hora_fim: document.getElementById("data_hora_fim").value,
        local_obra: document.getElementById("local_obra").value,
        servico: document.getElementById("servico").value
      };

      try {
        const response = await fetch(SB_URL, {
          method: 'POST',
          headers: {
            'apikey': SB_KEY,
            'Authorization': `Bearer ${SB_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal',
            'x-admin-code': tokenAdmin
          },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          alert("Atividade gravada com sucesso!");
          document.getElementById("formAtividade").reset();
          window.location.href = "index.html";
        } else {
          alert("Erro ao gravar. Código técnico inválido ou sem privilégios.");
        }
      } catch (err) {
        console.error(err);
        alert("Erro de comunicação.");
      }
    });
  </script>
</body>
</html>
